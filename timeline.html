  body[data-theme="dark"] .list-view tbody td .lv-inline-input{ background:var(--surface-2);border:1px solid var(--border-s);color:var(--t1);border-radius:6px;padding:4px 6px }
  body[data-theme="dark"] .list-view tbody td .lv-inline-input:focus{ border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim) }
  body[data-theme="dark"] .list-view tbody td .lv-inline-seg{ background:var(--surface-2);border:1px solid var(--border-s);border-radius:8px;padding:2px }
  body[data-theme="dark"] .list-view tbody td .lv-inline-seg button{ color:var(--t3);border-radius:6px;height:20px }
  body[data-theme="dark"] .list-view tbody td .lv-inline-seg button:hover{ background:rgba(255,255,255,.06);color:var(--t1) }
  body[data-theme="dark"] .list-view tbody td .lv-inline-seg button.active.p1{ background:rgba(255,69,58,.15);color:#ff453a }
  body[data-theme="dark"] .list-view tbody td .lv-inline-seg button.active.p2{ background:rgba(255,214,10,.15);color:#e6b800 }
  body[data-theme="dark"] .list-view tbody td .lv-inline-seg button.active.p3{ background:rgba(255,255,255,.08);color:var(--t1) }
  body[data-theme="dark"] .list-view tbody td .lv-status-pill{ background:var(--surface-2);color:var(--t3);border:1px solid var(--border-s);border-radius:99px;padding:2px 10px;font-size:10px;font-weight:600 }

  /* ─── THINGS 3 theme — soft pastels, white card, friendly ── */
  body[data-theme="things"]{
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter","Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono","Roboto Mono",monospace;
    --bg:#ffffff; --bg-side:#f7f8fa; --bg-top:#f7f8fa; --bg-grid:#fafbfc;
    --surface:#ffffff; --surface-2:#f3f4f7; --surface-3:#e9ebf0;
    --border:rgba(0,0,0,.06); --border-s:rgba(0,0,0,.08);
    --t1:#1a1a1a; --t2:#3c4046; --t3:#6b7280; --t4:#9aa0a8;
    --accent:#2c7be5; --accent-2:#2c7be5; --accent-dim:rgba(44,123,229,.10); --accent-border:rgba(44,123,229,.30);
    --p1:#ff3b30; --p2:#f5c43d; --p3:#9aa0a8;
    --proj-LIFE:#a8d8ea; --proj-HOME:#ffd4c4; --proj-WORK:#d4c5f9; --proj-ADMIN:#c5e8d5;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.06);
    --shadow-lg:0 12px 40px rgba(0,0,0,.12);
    --rk:8px;
  }
  body[data-theme="things"]{
    background:#ffffff;
    color:var(--t1);
  }
  body[data-theme="things"] .app{
    background:#ffffff;
  }
  body[data-theme="things"] .body{ background:#ffffff }

  /* Topbar */
  body[data-theme="things"] .topbar{
    background:#f7f8fa;
    border-bottom:1px solid var(--border);
    height:48px; padding:0 16px;
  }
  body[data-theme="things"] .tb-logo{color:var(--t1)}
  body[data-theme="things"] .tb-icon{
    background:linear-gradient(135deg,#2c7be5,#5ba0f2);
    color:#fff; border-radius:7px; width:24px; height:24px;
  }
  body[data-theme="things"] .tb-sep{background:var(--border)}
  body[data-theme="things"] .tb-crumb{color:var(--t3)}
  body[data-theme="things"] .tb-crumb-active{color:var(--t1)}
  body[data-theme="things"] .tb-btn{
    background:#ffffff;
    border:1px solid var(--border-s);
    color:var(--t2);
    border-radius:8px; height:30px;
  }
  body[data-theme="things"] .tb-btn:hover{background:#f3f4f7;color:var(--t1)}
  body[data-theme="things"] .tb-btn.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-border)}
  body[data-theme="things"] .tb-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  body[data-theme="things"] .tb-btn.primary:hover{background:#1a6ad8}
  body[data-theme="things"] .tb-btn-group{background:#fff;border:1px solid var(--border-s);border-radius:8px;padding:3px}
  body[data-theme="things"] .tb-btn-group .tb-btn{border-radius:6px;border:none;background:transparent;color:var(--t3);height:24px}
  body[data-theme="things"] .tb-btn-group .tb-btn:hover{color:var(--t1);background:rgba(0,0,0,.04)}
  body[data-theme="things"] .tb-btn-group .tb-btn.active{background:#fff;color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  body[data-theme="things"] .zoom-pill{background:#fff;border:1px solid var(--border-s);border-radius:8px;height:30px;overflow:hidden}
  body[data-theme="things"] .zoom-pill button{color:var(--t3)}
  body[data-theme="things"] .zoom-pill button:hover{background:#f3f4f7;color:var(--t1)}
  body[data-theme="things"] .zoom-pill .label{color:var(--t3);border-color:var(--border)}

  /* Sidebar (project panel) */
  body[data-theme="things"] .proj-panel{
    background:#f7f8fa;
    border-right:1px solid var(--border);
  }
  body[data-theme="things"] .proj-panel-hdr{height:52px;border-bottom:1px solid var(--border);padding:0 12px 0 16px}
  body[data-theme="things"] .proj-panel-title{color:var(--t3);letter-spacing:.06em;font-size:10.5px}
  body[data-theme="things"] .proj-panel-toggle{
    background:#fff;border:1px solid var(--border-s);color:var(--t3);border-radius:6px;
  }
  body[data-theme="things"] .proj-panel-toggle:hover{background:#f3f4f7;color:var(--t1)}
  body[data-theme="things"] .proj-item{
    margin:1px 8px; height:34px; padding:0 12px;
    border-radius:8px; border-left:none; color:var(--t1);
    font-size:13px;
  }
  body[data-theme="things"] .proj-item:hover{background:rgba(0,0,0,.04)}
  body[data-theme="things"] .proj-item.active{
    background:var(--accent-dim); color:var(--accent);
    border-left:none; font-weight:600;
  }
  body[data-theme="things"] .proj-item.active .proj-item-cnt{color:var(--accent)}
  body[data-theme="things"] .proj-item-dot{border-radius:50%;width:10px;height:10px}
  body[data-theme="things"] .proj-item-cnt{color:var(--t4)}
  body[data-theme="things"] .proj-rename-input{
    background:#fff;border:1px solid var(--accent);color:var(--t1);border-radius:4px;
  }
  body[data-theme="things"] .proj-add-btn{
    border:1px dashed var(--border-s);color:var(--t3);border-radius:8px;height:34px;
  }
  body[data-theme="things"] .proj-add-btn:hover{
    border-color:var(--accent-border);color:var(--accent);background:var(--accent-dim);
  }
  body[data-theme="things"] .proj-empty{color:var(--t4)}

  /* Left task pane */
  body[data-theme="things"] .lpane{
    background:#fafbfc;
    border-right:1px solid var(--border);
  }
  body[data-theme="things"] .lpane-hdr{
    height:54px; border-bottom:1px solid var(--border); padding:0 16px;
  }
  body[data-theme="things"] .lpane-minimap-spacer{
    background:#fafbfc; border-bottom:1px solid var(--border);
  }
  body[data-theme="things"] .lpane-hdr h2{color:var(--t3);letter-spacing:.06em;font-size:10.5px}
  body[data-theme="things"] .lpane-hdr .pill{
    background:#fff; border:1px solid var(--border-s); color:var(--t3);
    border-radius:99px; padding:2px 9px; font-size:10.5px;
  }

  /* Task rows */
  body[data-theme="things"] .task-row{
    height:var(--row-h); border-bottom:1px solid transparent; color:var(--t1);
    font-size:13px; font-weight:400;
    margin:0 8px; padding:0 12px 0 30px; border-radius:8px;
  }
  body[data-theme="things"] .task-row::before,
  body[data-theme="things"] .task-row::after{background:rgba(0,0,0,.08) !important}
  body[data-theme="things"] .task-row:hover,
  body[data-theme="things"] .task-row.hover{background:rgba(0,0,0,.04)}
  body[data-theme="things"] .task-row.selected{
    background:var(--accent-dim) !important; box-shadow:none !important;
  }
  body[data-theme="things"] .task-row.selected .ttl{color:var(--accent);font-weight:600}
  body[data-theme="things"] .task-row .chk{
    width:16px; height:16px;
    border:1.5px solid #c4c8d0; border-radius:50%;
  }
  body[data-theme="things"] .task-row .chk.done{background:var(--accent);border-color:var(--accent)}
  body[data-theme="things"] .task-row .chk.done::after{border-color:#fff}
  body[data-theme="things"] .task-row.done .ttl{color:var(--t3);text-decoration:line-through}
  body[data-theme="things"] .task-row.is-project{font-weight:600;color:var(--t1)}
  body[data-theme="things"] .task-row .est{color:var(--t4)}
  body[data-theme="things"] .task-row .pri-bar{background:var(--t4)}
  body[data-theme="things"] .task-row .wbs{
    background:#f3f4f7;border:1px solid var(--border-s);color:var(--t3);border-radius:4px;
  }
  body[data-theme="things"] .task-row.selected .wbs{
    background:#fff;border-color:var(--accent-border);color:var(--accent);
  }

  /* Group rows */
  body[data-theme="things"] .group-row{
    background:#fafbfc; border-bottom:1px solid var(--border);
    height:var(--row-h); padding:0 16px 0 12px;
  }
  body[data-theme="things"] .group-row:hover{background:rgba(0,0,0,.03)}
  body[data-theme="things"] .group-chv{color:var(--t3)}
  body[data-theme="things"] .group-name{
    color:var(--t1); font-size:13px; font-weight:600; letter-spacing:0;
  }
  body[data-theme="things"] .group-dot{border-radius:50%;width:10px;height:10px}
  body[data-theme="things"] .group-cnt{color:var(--t4)}

  /* Right pane / timeline header */
  body[data-theme="things"] .rpane{background:#fff}
  body[data-theme="things"] .timeline-hdr{
    background:#fafbfc; border-bottom:1px solid var(--border); height:54px;
  }
  body[data-theme="things"] .hdr-month{
    background:#fafbfc; color:var(--t2);
    border-right:1px solid var(--border);
    font-weight:600; text-transform:none; letter-spacing:0; font-size:12px;
  }
  body[data-theme="things"] .hdr-month .yr{color:var(--t4)}
  body[data-theme="things"] .hdr-day{
    border-right:1px solid rgba(0,0,0,.04); color:var(--t3);
  }
  body[data-theme="things"] .hdr-day .dow{color:var(--t4);text-transform:uppercase;font-weight:600}
  body[data-theme="things"] .hdr-day .dom{color:var(--t1);font-weight:500}
  body[data-theme="things"] .hdr-day.weekend{background:#f3f4f7}
  body[data-theme="things"] .hdr-day.weekend .dom{color:var(--t4)}
  body[data-theme="things"] .hdr-day.today{background:var(--accent-dim)}
  body[data-theme="things"] .hdr-day.today .dow{color:var(--accent);font-weight:700}
  body[data-theme="things"] .hdr-day.today .dom{color:var(--accent);font-weight:700}
  body[data-theme="things"] .hdr-day.month-start{border-left:1px solid var(--border)}

  /* Grid */
  body[data-theme="things"] .grid-scroll{background:#fff}
  body[data-theme="things"] .grid-col{border-right:1px solid rgba(0,0,0,.025)}
  body[data-theme="things"] .grid-col.weekend{background:#f7f8fa}
  body[data-theme="things"] .grid-col.month-start{border-left:1px solid var(--border)}
  body[data-theme="things"] .row-line{border-bottom:1px solid rgba(0,0,0,.03)}
  body[data-theme="things"] .row-line.group{background:#fafbfc;border-bottom-color:var(--border)}
  body[data-theme="things"] .row-line.hover{background:rgba(0,0,0,.025)}
  body[data-theme="things"] .row-line.selected-row{background:var(--accent-dim)}

  /* Today line */
  body[data-theme="things"] .today-line{
    background:var(--accent) !important;
    box-shadow:0 0 8px rgba(44,123,229,.45) !important;
    width:2px !important;
  }
  body[data-theme="things"] .today-line::after{
    background:var(--accent); color:#fff;
    border-radius:99px; padding:2px 9px; font-weight:700;
  }

  /* Bars — soft pastel pills. Background driven by inline --bar-c (set from task.color)
     so the drawer colour picker wins. Single dark-slate text colour reads on all pastels. */
  body[data-theme="things"] .bar:not(.project):not(.milestone){
    background: var(--bar-c) !important;
    border:none !important;
    border-radius:999px !important;
    color:#1f2937 !important;
    height:24px !important;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 1px 2px rgba(0,0,0,.06) !important;
    text-shadow:none !important;
    font-weight:600 !important;
    padding:0 12px 0 14px !important;
    font-size:11.5px !important;
  }
  body[data-theme="things"] .bar:hover{
    filter:brightness(1.03);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 3px 10px rgba(0,0,0,.10) !important;
  }
  body[data-theme="things"] .bar.selected{outline:2px solid var(--accent);outline-offset:2px}
  body[data-theme="things"] .bar.done{opacity:.55;filter:saturate(.5)}
  body[data-theme="things"] .bar-prog{
    background:rgba(0,0,0,.08) !important;
    border-radius:999px 0 0 999px !important;
  }
  body[data-theme="things"] .bar:not(.project):not(.milestone)::before,
  body[data-theme="things"] .bar:not(.project):not(.milestone)::after{background:rgba(0,0,0,.35)}
  body[data-theme="things"] .bar:hover::before,
  body[data-theme="things"] .bar:hover::after{background:rgba(0,0,0,.55)}
  body[data-theme="things"] .bar-meta{color:rgba(0,0,0,.45)}

  /* Dep knob */
  body[data-theme="things"] .dep-knob{
    background:var(--accent); border:2px solid #fff;
  }
  body[data-theme="things"] .dep-knob:hover{box-shadow:0 0 0 5px rgba(44,123,229,.18)}

  /* Project parent bar */
  body[data-theme="things"] .bar.project::before{
    background:linear-gradient(90deg,#2c7be5,#5ba0f2) !important;
    height:5px; border:none; border-radius:99px;
  }
  body[data-theme="things"] .bar.project::after,
  body[data-theme="things"] .bar.project .proj-cap{border-top-color:#2c7be5}
  body[data-theme="things"] .bar.project .bar-ttl{
    color:var(--t3); text-transform:none; letter-spacing:.02em;
    font-size:10.5px; font-weight:700;
  }

  /* Milestone */
  body[data-theme="things"] .bar.milestone .diamond{
    /* background left to inline style (task.color) so drawer pick shows through */
    border-radius:50%; transform:rotate(0) !important;
    box-shadow:0 2px 6px rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.4),0 0 0 2px #fff !important;
  }
  body[data-theme="things"] .bar.milestone .bar-ttl{color:var(--t1);font-weight:600}

  /* Inspector */
  body[data-theme="things"] .inspector{
    background:#fff; border:1px solid var(--border);
    border-radius:12px;
    box-shadow:0 16px 50px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.04);
    color:var(--t1);
  }
  body[data-theme="things"] .inspector::before{
    background:#fff;
    border-right-color:var(--border);
    border-bottom-color:var(--border);
  }
  body[data-theme="things"] .ins-title{color:var(--t1)}
  body[data-theme="things"] .ins-close{color:var(--t3)}
  body[data-theme="things"] .ins-close:hover{background:#f3f4f7;color:var(--t1);border-color:var(--border)}
  body[data-theme="things"] .ins-row .lbl{color:var(--t3)}
  body[data-theme="things"] .ins-row .val{color:var(--t1)}
  body[data-theme="things"] .ins-row .dur-pill{
    background:var(--accent-dim); color:var(--accent);
    border:none; border-radius:99px; font-weight:600;
  }
  body[data-theme="things"] .ins-acts{border-top:1px solid var(--border)}
  body[data-theme="things"] .ins-btn{
    background:#f3f4f7; border:1px solid var(--border-s);
    color:var(--t1); border-radius:6px;
  }
  body[data-theme="things"] .ins-btn:hover{background:#e9ebf0;color:var(--t1);border-color:var(--border-s)}
  body[data-theme="things"] .ins-btn.link-btn{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-border)}
  body[data-theme="things"] .ins-btn.link-btn:hover{background:rgba(44,123,229,.18);color:var(--accent)}
  body[data-theme="things"] .ins-input,
  body[data-theme="things"] .ins-textarea,
  body[data-theme="things"] .ins-date,
  body[data-theme="things"] .ins-select,
  body[data-theme="things"] .ins-num{
    background:#f7f8fa; border:1px solid var(--border-s);
    color:var(--t1); border-radius:6px; padding:6px 8px;
  }
  body[data-theme="things"] .ins-input:focus,
  body[data-theme="things"] .ins-textarea:focus,
  body[data-theme="things"] .ins-date:focus,
  body[data-theme="things"] .ins-select:focus,
  body[data-theme="things"] .ins-num:focus{
    border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim);
  }
  body[data-theme="things"] .ins-seg{background:#f3f4f7;border:1px solid var(--border-s);border-radius:8px}
  body[data-theme="things"] .ins-seg button{color:var(--t3);border-radius:6px}
  body[data-theme="things"] .ins-seg button:hover{color:var(--t1);background:rgba(0,0,0,.04)}
  body[data-theme="things"] .ins-seg button.active{background:#fff;color:var(--accent);border:1px solid var(--accent-border)}
  body[data-theme="things"] .ins-field-lbl{color:var(--t3)}
  body[data-theme="things"] .ins-dep-chip{
    background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border);border-radius:6px;
  }
  body[data-theme="things"] .ins-add-btn{
    border:1px dashed var(--border-s); color:var(--t3); border-radius:6px;
  }
  body[data-theme="things"] .ins-add-btn:hover{
    border-color:var(--accent-border); color:var(--accent); background:var(--accent-dim);
  }

  /* Status footer */
  body[data-theme="things"] .sbar{
    background:#f7f8fa; border-top:1px solid var(--border);
    color:var(--t3); height:28px;
  }
  body[data-theme="things"] .sbar kbd{
    background:#fff; border:1px solid var(--border-s); color:var(--t2); border-radius:4px;
  }
  body[data-theme="things"] .sbar .dot{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.5)}

  /* Dependency arrows */
  body[data-theme="things"] .dep-path{stroke:#8b94a8;opacity:.55}
  body[data-theme="things"] .dep-path.show-all{opacity:.85}
  body[data-theme="things"] .dep-path:hover{stroke:var(--accent);opacity:1}
  body[data-theme="things"] .dep-svg .row-divider{stroke:rgba(0,0,0,.025)}

  /* Scrollbars */
  body[data-theme="things"] ::-webkit-scrollbar{width:10px;height:10px}
  body[data-theme="things"] ::-webkit-scrollbar-thumb{
    background:rgba(0,0,0,.12); border:2px solid transparent;
    border-radius:99px; background-clip:padding-box;
  }
  body[data-theme="things"] ::-webkit-scrollbar-thumb:hover{
    background:rgba(0,0,0,.2); background-clip:padding-box;
  }

  /* Sprint bands */
  body[data-theme="things"]{
    --sprint-even-bg:rgba(0,0,0,.015);
    --sprint-bound:rgba(0,0,0,.05);
    --sprint-release:rgba(44,123,229,.25);
    --sprint-label:rgba(44,123,229,.5);
  }

  /* Context menu */
  body[data-theme="things"] .ctx-menu{
    background:#fff; border:1px solid var(--border); border-radius:10px;
    box-shadow:0 12px 40px rgba(0,0,0,.15); padding:6px;
  }
  body[data-theme="things"] .ctx-item{
    border-radius:6px; color:var(--t1); padding:8px 12px;
  }
  body[data-theme="things"] .ctx-item:hover{background:var(--accent-dim);color:var(--accent)}
  body[data-theme="things"] .ctx-item:hover .ico{color:var(--accent)}
  body[data-theme="things"] .ctx-item .ico{color:var(--t3)}
  body[data-theme="things"] .ctx-item .kbd{
    background:#f3f4f7;color:var(--t3);border:1px solid var(--border-s);border-radius:4px;
  }
  body[data-theme="things"] .ctx-sep{background:var(--border)}
  body[data-theme="things"] .ctx-hdr{color:var(--t3)}

  /* File / Views menu */
  body[data-theme="things"] .file-menu-drop,
  body[data-theme="things"] .views-menu-drop{
    background:#fff; border:1px solid var(--border); border-radius:10px;
    box-shadow:0 12px 40px rgba(0,0,0,.15); padding:6px; color:var(--t1);
  }
  body[data-theme="things"] .file-menu-item,
  body[data-theme="things"] .views-menu-drop .vm-item{
    border-radius:6px; padding:8px 12px; color:var(--t1);
  }
  body[data-theme="things"] .file-menu-item:hover,
  body[data-theme="things"] .views-menu-drop .vm-item:hover{
    background:var(--accent-dim); color:var(--accent);
  }
  body[data-theme="things"] .file-menu-item .kbd{
    background:#f3f4f7; color:var(--t3); border:1px solid var(--border-s); border-radius:4px;
  }
  body[data-theme="things"] .file-menu-sep,
  body[data-theme="things"] .views-menu-drop .vm-sep{background:var(--border)}
  body[data-theme="things"] .views-menu-btn{
    background:#fff; border:1px solid var(--border-s); color:var(--t2);
    border-radius:8px; height:30px;

const TIMELINE_TWK_KEY = 'timeline-tweaks-v1';

function useTweaks(defaults) {
  const stored = (() => {
    try { return JSON.parse(localStorage.getItem(TIMELINE_TWK_KEY)) || {}; }
    catch(e) { return {}; }
  })();
  const [values, setValues] = React.useState({...defaults, ...stored});
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => {
      const next = { ...prev, ...edits };
      try { localStorage.setItem(TIMELINE_TWK_KEY, JSON.stringify(next)); } catch(e) {}
      return next;
    });
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Settings', children }) {
  const [open, setOpen] = React.useState(false);
  // Toggle/activate/deactivate protocol + Cmd/Ctrl+, shortcut all funnel through
  // setOpen — duplicate activate messages are no-ops.
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
      else if (t === '__toggle_edit_mode') setOpen((o) => !o);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  React.useEffect(() => {
    const onKey = (e) => {
      // Cmd/Ctrl+, toggles regardless of open state.
      if ((e.metaKey || e.ctrlKey) && e.key === ',') {
        e.preventDefault();
        setOpen((o) => !o);
        return;
      }
      // Escape only when open, and not when something else has focus that
      // needs Esc (a contenteditable, an open <select>, etc.). For simplicity
      // we let Esc always close — the drawer is the most recently opened
      // overlay so closing it first is the natural behaviour.
      if (e.key === 'Escape' && open) {
        e.stopPropagation();
        setOpen(false);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open]);

  const dismiss = () => setOpen(false);

  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div className="set-backdrop" data-open={open ? '1' : '0'} onClick={dismiss} aria-hidden="true" />
      <aside className="set-drawer" data-open={open ? '1' : '0'} role="dialog" aria-label={title} aria-hidden={!open}>
        <div className="set-hd">
          <b>{title}</b>
          <button className="set-x" aria-label="Close settings" onClick={dismiss}>×</button>
        </div>
        <div className="set-body">{open ? children : null}</div>
      </aside>
    </>
  );
}

function TweakSection({ title, label, children }) {
  return (<><div className="set-sect">{title ?? label}</div>{children}</>);
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'set-row set-row-h' : 'set-row'}>
      <div className="set-lbl"><span>{label}</span>{value != null && <span className="set-val">{value}</span>}</div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="set-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="set-row set-row-h">
      <div className="set-lbl"><span>{label}</span></div>
      <button type="button" className="set-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="set-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

// Segmented radio. Used for theme/bar-style/label-position pickers.
function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  return (
    <TweakRow label={label}>
      <div className="set-seg" role="radiogroup" aria-label={label}>
        {opts.map((o) => (
          <button key={String(o.value)} type="button" role="radio"
                  aria-checked={o.value === value}
                  data-on={o.value === value ? '1' : '0'}
                  onClick={() => onChange(o.value)}>{o.label}</button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, danger = false, block = false }) {
  const cls = ['set-btn'];
  if (danger) cls.push('danger');
  if (block) cls.push('block');
  return (<button type="button" className={cls.join(' ')} onClick={onClick}>{label}</button>);
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakSelect, TweakRadio, TweakButton,
});
</script>

<script type="text/babel">
const DAY_MS = 86400000;
const _today = new Date(); _today.setHours(0,0,0,0);
const TODAY = _today;

function ymd(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
function parseYmd(s){ return new Date(s+'T00:00:00'); }
function addDays(s,n){ const d=parseYmd(s); d.setDate(d.getDate()+n); return ymd(d); }
function diffDays(a,b){ return Math.round((parseYmd(b)-parseYmd(a))/DAY_MS); }
function fmtShort(s){ return parseYmd(s).toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function isWeekend(s){ const d=parseYmd(s).getDay(); return d===0||d===6; }
const todayStr = ymd(TODAY);
const DOW    = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const CLOCK_DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function fmtClock(d){
  const hh=String(d.getHours()).padStart(2,'0'), mm=String(d.getMinutes()).padStart(2,'0');
  return `${hh}:${mm} · ${CLOCK_DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

// ── Working calendar helpers ──
const DEFAULT_CALENDAR = { workingDays: [1,2,3,4,5], holidays: [] };
function getCalendar(c){
  if(!c) return DEFAULT_CALENDAR;
  const wd = Array.isArray(c.workingDays) && c.workingDays.length ? c.workingDays : DEFAULT_CALENDAR.workingDays;
  const hd = Array.isArray(c.holidays) ? c.holidays : [];
  return { workingDays: wd, holidays: hd };
}
function isWorkingDay(s, calendar){
  const cal = getCalendar(calendar);
  if (cal.holidays.includes(s)) return false;
  const dow = parseYmd(s).getDay();
  return cal.workingDays.includes(dow);
}
// Inclusive working-day count between two dates. If end < start returns negative.
function workingDaysBetween(start, end, calendar){
  if (!start || !end) return 0;
  const cal = getCalendar(calendar);
  const a = parseYmd(start), b = parseYmd(end);
  const sign = a <= b ? 1 : -1;
  let s = sign > 0 ? a : b;
  const e = sign > 0 ? b : a;
  let count = 0, cur = ymd(s);
  while (parseYmd(cur) <= e){
    if (isWorkingDay(cur, cal)) count++;
    cur = addDays(cur, 1);
    if (count > 99999) break;
  }
  return sign * count;
}
// Returns ymd string n working days after start. n may be 0 (returns start
// snapped forward to next working day), positive, or negative.
function addWorkingDays(start, n, calendar){
  const cal = getCalendar(calendar);
  let cur = start;
  if (n === 0) {
    // snap to working day forward
    let safety = 0;
    while (!isWorkingDay(cur, cal) && safety++ < 4000) cur = addDays(cur, 1);
    return cur;
  }
  const step = n > 0 ? 1 : -1;
  let remaining = Math.abs(n);
  let safety = 0;
  while (remaining > 0 && safety++ < 40000){
    cur = addDays(cur, step);
    if (isWorkingDay(cur, cal)) remaining--;
  }
  return cur;
}
function formatDuration(start, end, calendar){
  const total = diffDays(start, end) + 1;
  const work = workingDaysBetween(start, end, calendar);
  if (work === total) return `${total}d`;
  return `${work}d (${total} total)`;
}

  const p = { id: 'proj-mpc6cybsp07', name: 'Sample workspace', color: '#b2e0ac', created: '2026-05-19', baseline: null, tasks: DEMO_TASKS, owners, calendar: {...DEFAULT_CALENDAR, holidays: [...DEFAULT_CALENDAR.holidays]}, autoSchedule: 'cascade', tagRegistry: [] };
  return { version: CURRENT_VERSION, projects: [p], activeProjectId: p.id };
}

// ── Status enum (Phase A2) ──
// Single source of truth for task status. `done` boolean is kept as a
// derived/synced field for back-compat with existing renderers — see syncDoneFromStatus
// and syncStatusFromDone helpers below.
const STATUSES = ['backlog', 'todo', 'inprogress', 'review', 'done', 'blocked', 'onhold'];
const STATUS_META = {
  backlog:    { label: 'Backlog',     color: '#64748b' },
  todo:       { label: 'To do',       color: '#94a3b8' },
  inprogress: { label: 'In progress', color: '#a5b4fc' },
  review:     { label: 'In review',   color: '#fcd34d' },
  done:       { label: 'Done',        color: '#86efac' },
  blocked:    { label: 'Blocked',     color: '#ef4444' },
  onhold:     { label: 'On hold',     color: '#cbd5e1' },
};
function normalizeStatus(s, doneFallback){
  if (typeof s === 'string' && STATUSES.includes(s)) return s;
  return doneFallback ? 'done' : 'todo';
}
function syncDoneFromStatus(t){
  // Mutates and returns t with done aligned to status.
  t.done = t.status === 'done';
  return t;
}

const CURRENT_VERSION = 4;
const MIGRATIONS = [
  { from: 1, to: 2, migrate(data){
    data.projects = (data.projects || []).map(p => ({...p, owners: p.owners || []}));
    data.version = 2;
    return data;
  } },
  { from: 2, to: 3, migrate(data){
    data.projects = (data.projects || []).map(p => ({
      ...p,
      calendar: p.calendar || {...DEFAULT_CALENDAR, holidays: [...DEFAULT_CALENDAR.holidays]},
      autoSchedule: p.autoSchedule || 'cascade',
      tasks: (p.tasks || []).map(t => {
        const lag = typeof t.lag === 'number' ? t.lag : 0;
        const next = {
          ...t,
          deps: (t.deps || []).map(d =>
            typeof d === 'string' ? {id: d, type: 'FS', lag} : d
          ),
        };
        // Per-task lag is deprecated — promoted to per-dep above.
        delete next.lag;
        return next;
      }),
    }));
    data.version = 3;
    return data;
  } },
  // v3 → v4 (Phase A): adds status enum, tags, comments, project tagRegistry,
  // per-resource availability calendar (workingDays / holidays / PTO / allocationPct).
  // All new fields default to back-compat-safe values so old workspaces load identically.
  { from: 3, to: 4, migrate(data){
    data.projects = (data.projects || []).map(p => ({
      ...p,
      tagRegistry: Array.isArray(p.tagRegistry) ? p.tagRegistry : [],
      owners: (p.owners || []).map(o => ({
        ...o,
        // null calendar => owner falls back to project calendar.
        calendar: o.calendar || null,
        // [{start,end,note}] for PTO blocks (working-day skips).
        pto: Array.isArray(o.pto) ? o.pto : [],
        // 100 = full availability; <100 lets the scheduler stretch durations later.
        allocationPct: typeof o.allocationPct === 'number' ? o.allocationPct : 100,
      })),
      tasks: (p.tasks || []).map(t => {
        const status = normalizeStatus(t.status, t.done);
        const next = {
          ...t,
          status,
          // Keep `done` synced so existing renderers (30+ sites) keep working.
          done: status === 'done',
          tags: Array.isArray(t.tags) ? t.tags : [],
          comments: Array.isArray(t.comments) ? t.comments : [],
        };
        return next;
      }),
    }));
    data.version = 4;
    return data;
  } },
];

function migrateWorkspace(data){
  if (!data || typeof data !== 'object') throw new Error('Invalid workspace file');
  let v = data.version || 1;
  if (v > CURRENT_VERSION) {
    throw new Error('This file was saved by a newer version of Timeline (v' + v + '). Please update the app to open it.');
  }
  let cur = data;
  while (v < CURRENT_VERSION) {
    const step = MIGRATIONS.find(m => m.from === v);
    if (!step) throw new Error('No migration available from workspace version ' + v + ' to ' + CURRENT_VERSION);
    cur = step.migrate(cur);
    if ((cur.version || 0) <= v) throw new Error('Migration from v' + v + ' did not advance the version');
    v = cur.version;
  }
  cur.version = CURRENT_VERSION;
  return cur;
}

function serializeWorkspace(projects, activeProjectId){
  return JSON.stringify({
    version: CURRENT_VERSION,
    activeProjectId,
    projects: projects.map(p => ({
      ...p,
      baseline: (p.baseline instanceof Map) ? Object.fromEntries(p.baseline) : (p.baseline || null)
    }))
  }, null, 2);
}

function parseWorkspace(json){
  const raw = JSON.parse(json);
  if (!raw || !Array.isArray(raw.projects)) throw new Error('Invalid workspace file');
  const data = migrateWorkspace(raw);
  return {
    version: data.version,
    activeProjectId: data.activeProjectId || null,
    projects: data.projects.map(p => ({
      id: p.id || genId('proj-'),
      name: p.name || 'Untitled',
      color: p.color || '#7c3aed',
      created: p.created || todayStr,
      // Defensive normalization of Phase A fields — keeps invariants even if a file
      // came in pre-migrated or hand-edited.
      tasks: (Array.isArray(p.tasks) ? p.tasks : []).map(t => {
        const status = normalizeStatus(t.status, t.done);
        return {
          ...t,
          status,
          done: status === 'done',
          tags: Array.isArray(t.tags) ? t.tags : [],
          comments: Array.isArray(t.comments) ? t.comments : [],
        };
      }),
      baseline: p.baseline ? new Map(Object.entries(p.baseline)) : null,
      owners: (Array.isArray(p.owners) ? p.owners : []).map(o => ({
        ...o,
        calendar: o.calendar || null,
        pto: Array.isArray(o.pto) ? o.pto : [],
        allocationPct: typeof o.allocationPct === 'number' ? o.allocationPct : 100,
      })),
      calendar: p.calendar || {...DEFAULT_CALENDAR, holidays: [...DEFAULT_CALENDAR.holidays]},
      autoSchedule: p.autoSchedule || 'cascade',
      tagRegistry: Array.isArray(p.tagRegistry) ? p.tagRegistry : [],
      // Phase B2: saved views are additive — no migration step, just defensive default.
      savedViews: Array.isArray(p.savedViews) ? p.savedViews : [],
    }))
  };
}

// ── Orphan migration ──
// Ensures every non-project task has a parent set. Orphans get reparented to the
// first project task; if none exist, a default "Tasks" set is created.
function migrateOrphans(projects){
  return projects.map(p => {
    if(!p.tasks?.length) return p;
    const orphans = p.tasks.filter(t => t.kind !== 'project' && !t.parent);
    if(!orphans.length) return p;
    let firstSetId = p.tasks.find(t => t.kind === 'project')?.id;
    let newTasks = p.tasks;
    if(!firstSetId){
      firstSetId = 't-default-' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
      const start = orphans[0].start || ymd(TODAY);
      const end = orphans.reduce((mx,t) => t.end > mx ? t.end : mx, start);
      newTasks = [{id: firstSetId, kind: 'project', parent: null, title: 'Tasks', start, end, priority: 'p2', progress: 0}, ...newTasks];
    }
    return {...p, tasks: newTasks.map(t => (t.kind !== 'project' && !t.parent) ? {...t, parent: firstSetId} : t)};
  });
}

// ── Row building ──
// Per-depth indent in the left-pane task list. Used both by the row renderer
// (padding-left = 22 + depth*INDENT_PX) and the drag-to-indent math.
const INDENT_PX = 16;

function buildRows(tasks, collapsed, groupBy, ownerColors){
  return groupBy === 'owner'
    ? buildRowsByOwner(tasks, collapsed, ownerColors)
    : buildRowsByProject(tasks, collapsed);
}

function buildRowsByProject(tasks, collapsed){
  const out = [];
  const byParent = new Map();
  for (const t of tasks){
    const k = t.parent || '__root';
    if (!byParent.has(k)) byParent.set(k,[]);
    byParent.get(k).push(t);
  }
  // Phase A1 — recursive walk so arbitrarily deep subtask trees render.
  // Each level increments depth; collapse at any level hides that subtree.
  const walk = (parentId, depth) => {
    const kids = byParent.get(parentId) || [];
    for (const k of kids){
      // Flag rows whose own children are present so renderers can show a
      // summary marker / disclosure later. `isSummary` is derived, never stored.
      const isSummary = (byParent.get(k.id) || []).length > 0;
      out.push({...k, depth, isSummary});
      if (isSummary && !collapsed.has(k.id)) walk(k.id, depth + 1);
    }
  };
  const projects = (byParent.get('__root')||[]).filter(t=>t.kind==='project');
  for (const p of projects){
    out.push({...p, depth:0, isProject:true});
    if (!collapsed.has(p.id)) walk(p.id, 1);
  }
  // Orphan tasks (no parent, not a project) are migrated to a set on workspace load
  // via migrateOrphans(), so we don't render a synthetic "Loose tasks" group here.
  return out;
}

function buildRowsByOwner(tasks, collapsed, ownerColors={}){
  const out = [];
  const map = new Map();
  for (const t of tasks){
    if (t.kind==='project') continue;
    const k = t.owner || '—';
    if (!map.has(k)) map.set(k,[]);
    map.get(k).push(t);
  }
  const OWNER_COLORS = {Alex:'#96c6e8',Sam:'#f5dc88',Jordan:'#b2e0ac',Chris:'#f5bad0','—':'#9dd8d5'};
  for (const owner of [...map.keys()].sort()){
    const ots = map.get(owner).sort((a,b)=>a.start.localeCompare(b.start));
    const rs  = ots.reduce((mn,t)=>t.start<mn?t.start:mn, ots[0].start);
    const re  = ots.reduce((mx,t)=>t.end>mx?t.end:mx,   ots[0].end);
    const gid = 'owner-'+owner;
    out.push({id:gid, title:owner, isOwnerGroup:true, owner,
      start:rs, end:re, color:ownerColors[owner]||OWNER_COLORS[owner]||'#94a3b8', kind:'owner-group'});
    if (!collapsed.has(gid)){
      for (const t of ots) out.push({...t, depth:1});
    }
  }
  return out;
}

// ── Subtask helpers (Phase A1) ──
// All derived — no stored summary flag. A task is a "summary" iff some other
// task names it as parent. Roll-ups aggregate descendant leaves so renderers and
// inspectors can show summary start/end/progress/cost without mutating data.
function taskChildren(tasks, parentId){
  const out = [];
  for (const t of tasks) if (t.parent === parentId) out.push(t);
  return out;
}
function taskHasChildren(tasks, parentId){
  for (const t of tasks) if (t.parent === parentId) return true;
  return false;
}
function taskDescendants(tasks, rootId){
  const byParent = new Map();
  for (const t of tasks){
    const k = t.parent || '__root';
    if (!byParent.has(k)) byParent.set(k, []);
    byParent.get(k).push(t);
  }
  const out = [];
  const walk = (id) => {
    const kids = byParent.get(id) || [];
    for (const k of kids){ out.push(k); walk(k.id); }
  };
  walk(rootId);
  return out;
}
// Compute roll-ups for every task that has descendants. Returns Map<id, {start,end,progress}>.
// Leaves are not included. Caller decides whether to display rolled-up or stored values.
function computeSubtaskRollup(tasks){
  const byParent = new Map();
  for (const t of tasks){
    const k = t.parent || '__root';
    if (!byParent.has(k)) byParent.set(k, []);
    byParent.get(k).push(t);
  }
  const out = new Map();
  const visit = (id) => {
    const kids = byParent.get(id) || [];
    if (!kids.length) return null; // leaf
    let minS = null, maxE = null, wSum = 0, wDur = 0;
    for (const k of kids){
      // Recurse first so deep summaries roll all the way up.
      const child = visit(k.id);
      const s = child ? child.start : k.start;
      const e = child ? child.end   : k.end;
      const p = child ? child.progress : (typeof k.progress === 'number' ? k.progress : 0);
      if (minS === null || s < minS) minS = s;
      if (maxE === null || e > maxE) maxE = e;
      // Duration-weighted progress so a 10-day child counts 10× a 1-day child.
      const dur = Math.max(1, diffDays(s, e) + 1);
      wDur += dur; wSum += p * dur;
    }
    const roll = { start: minS, end: maxE, progress: wDur > 0 ? wSum / wDur : 0 };
    out.set(id, roll);
    return roll;
  };
  for (const t of tasks) visit(t.id);
  return out;
}

// ── Per-resource availability helpers (Phase A5) ──
// Resolve the effective working calendar for an owner: if owner.calendar is null,
// fall back to the project's calendar. PTO blocks act as extra holidays.
function getEffectiveCalendarForOwner(owner, projectCalendar){
  const base = (owner && owner.calendar) || projectCalendar || DEFAULT_CALENDAR;
  if (!owner || !Array.isArray(owner.pto) || owner.pto.length === 0){
    // No PTO — just return the base calendar.
    return base;
  }
  // Expand PTO ranges into per-day holidays merged with base.holidays.
  const extraHolidays = new Set(Array.isArray(base.holidays) ? base.holidays : []);
  for (const block of owner.pto){
    if (!block || !block.start || !block.end) continue;
    let cur = block.start;
    while (cur <= block.end){
      extraHolidays.add(cur);
      cur = addDays(cur, 1);
    }
  }
  return { ...base, holidays: Array.from(extraHolidays) };
}

// ── Dep helpers (v3 shape: [{id, type, lag}]) ──
function normalizeDep(d){
  if (!d) return null;
  if (typeof d === 'string') return {id: d, type: 'FS', lag: 0};
  return {id: d.id, type: d.type || 'FS', lag: typeof d.lag === 'number' ? d.lag : 0};
}
function depList(t){
  return (t?.deps || []).map(normalizeDep).filter(Boolean);
}

// Returns true if adding fromId as a predecessor of toId would create a cycle.
// Walk fromId's own predecessor graph; if we can reach toId, a cycle would form.
function wouldCreateCycle(tasks, fromId, toId){
  const byId = new Map(tasks.map(t => [t.id, t]));
  const visited = new Set();
  const stack = [fromId];
  while (stack.length){
    const cur = stack.pop();
    if (cur === toId) return true;
    if (visited.has(cur)) continue;
    visited.add(cur);
    const t = byId.get(cur);
    if (t) for (const d of depList(t)) stack.push(d.id);
  }
  return false;
}

// ── Critical path ──
function computeCriticalPath(tasks, calendar){
  const byId  = new Map(tasks.map(t=>[t.id,t]));
  const memo  = new Map();
  const dur   = t => Math.max(1, workingDaysBetween(t.start, t.end, calendar));
  const visit = id=>{
    if (memo.has(id)) return memo.get(id);
    const t=byId.get(id); if(!t) return {finish:0,prev:null};
    const td = dur(t);
    let best={finish:td,prev:null};
    for (const d of depList(t)){
      const r=visit(d.id); if(!r) continue;
      const pred=byId.get(d.id); if(!pred) continue;
      const pdur = dur(pred);
      // Effective predecessor finish in this branch (working days)
      let predFinish;
      if (d.type === 'SS')      predFinish = (r.finish - pdur) + d.lag + td;
      else if (d.type === 'FF') predFinish = r.finish + d.lag;
      else if (d.type === 'SF') predFinish = (r.finish - pdur) + d.lag;
      else                      predFinish = r.finish + d.lag + td; // FS
      if (predFinish > best.finish) best = {finish: predFinish, prev: d.id};
    }
    memo.set(id,best); return best;
  };
  const deps=new Set(); for(const t of tasks) for(const d of depList(t)) deps.add(d.id);
  let leaf=null,max=-1;
  for(const t of tasks){
    if(t.kind==='project') continue;
    const r=visit(t.id); const isLeaf=!deps.has(t.id);
    if(isLeaf&&r.finish>max){max=r.finish;leaf=t.id;}
  }
  const path=new Set(); const edges=new Set();
  let cur=leaf;
  while(cur){ path.add(cur); const prev=memo.get(cur)?.prev; if(prev) edges.add(prev+'→'+cur); cur=prev; }
  return {nodes:path,edges};
}

// ── At-risk tasks ──
function computeAtRisk(tasks){
  const byId=new Map(tasks.map(t=>[t.id,t]));
  const atRisk=new Set();
  for(const ms of tasks.filter(t=>t.milestone&&!t.done)){
    const stack=depList(ms).map(d=>d.id); const seen=new Set();
    while(stack.length){
      const id=stack.pop(); if(seen.has(id)) continue; seen.add(id);
      const t=byId.get(id); if(!t) continue;
      if(t.end>=ms.start) atRisk.add(id);
      for(const d of depList(t)) stack.push(d.id);
    }
  }
  return atRisk;
}

// ── Health pip ──
function getHealth(t, isAtRisk){
  if(t.done||t.kind==='project'||t.milestone) return null;
  if(t.blocking) return 'red';
  const todayD=parseYmd(todayStr), endD=parseYmd(t.end);
  if(endD<todayD&&(t.progress||0)<1) return 'red';
  if(t.baselineEnd){ const slip=diffDays(t.baselineEnd,t.end); if(slip>=4) return 'red'; if(slip>=2) return 'amber'; }
  const startD=parseYmd(t.start), dur=Math.max(1,diffDays(t.start,t.end)+1);
  const elapsed=Math.max(0,(todayD-startD)/DAY_MS);
  const expected=Math.min(1,elapsed/dur), actual=t.progress||0;
  if(expected-actual>0.4) return 'red';
  if(expected-actual>0.2) return 'amber';
  if(isAtRisk) return 'amber';
  return 'green';
}

// ── Dep chain ──
function getDepChain(tasks, id){
  const byId=new Map(tasks.map(t=>[t.id,t]));
  const dependents=new Map();
  for(const t of tasks) for(const d of depList(t)){
    if(!dependents.has(d.id)) dependents.set(d.id,[]);
    dependents.get(d.id).push(t.id);
  }
  const result=new Set([id]);
  const up=[id];
  while(up.length){ const cur=up.pop(); for(const d of depList(byId.get(cur))) if(!result.has(d.id)){result.add(d.id);up.push(d.id);} }
  const down=[id];
  while(down.length){ const cur=down.pop(); for(const c of (dependents.get(cur)||[])) if(!result.has(c)){result.add(c);down.push(c);} }
  return result;
}

// Compute child start/end given a predecessor + dep edge, respecting type and lag.
// Returns {start, end} the child must satisfy (minimum start; for FF/SF, end constraint).
function applyDepConstraint(child, pred, dep, calendar){
  const dur = diffDays(child.start, child.end); // keep duration
  const type = dep.type || 'FS';
  const lag = dep.lag || 0;
  if (type === 'FS'){
    const minStart = addWorkingDays(pred.end, 1 + lag, calendar);
    if (child.start < minStart) {
      const ns = minStart;
      return { start: ns, end: addDays(ns, dur) };
    }
  } else if (type === 'SS'){
    const minStart = addWorkingDays(pred.start, lag, calendar);
    if (child.start < minStart) {
      const ns = minStart;
      return { start: ns, end: addDays(ns, dur) };
    }
  } else if (type === 'FF'){
    const minEnd = addWorkingDays(pred.end, lag, calendar);
    if (child.end < minEnd) {
      const ne = minEnd;
      return { start: addDays(ne, -dur), end: ne };
    }
  } else if (type === 'SF'){
    const minEnd = addWorkingDays(pred.start, lag, calendar);
    if (child.end < minEnd) {
      const ne = minEnd;
      return { start: addDays(ne, -dur), end: ne };
    }
  }
  return null;
}

// ── Cascade shift dependents ──
function cascadeAfterMove(tasks, movedId, calendar){
  const byId=new Map(tasks.map(t=>[t.id,{...t}]));
  const dependents=new Map();
  for(const t of tasks) for(const d of depList(t)){
    if(!dependents.has(d.id)) dependents.set(d.id,[]);
    dependents.get(d.id).push({childId: t.id, dep: d});
  }
  const stack=[movedId]; const seen=new Set();
  while(stack.length){
    const id=stack.pop(); if(seen.has(id)) continue; seen.add(id);
    const t=byId.get(id); if(!t) continue;
    for(const {childId, dep} of (dependents.get(id)||[])){
      const child=byId.get(childId); if(!child) continue;
      if(child.locked) continue; // locked tasks are immovable anchors
      const adj = applyDepConstraint(child, t, dep, calendar);
      if (adj){
        child.start = adj.start; child.end = adj.end;
        stack.push(childId);
      }
    }
  }
  return Array.from(byId.values());
}

// ── Full forward pass auto-schedule ──
// Topological forward pass: every task starts at max(pred constraint) per its incoming deps.
// Locked tasks are treated as immovable anchors — constraints apply to their successors but
// the locked task's own dates are never modified.
// Cycles => bail without changes and surface a toast via the global __showToast hook.
function fullAutoSchedule(tasks, calendar){
  const byId = new Map(tasks.map(t => [t.id, {...t}]));
  const indeg = new Map();
  for (const t of tasks) indeg.set(t.id, 0);
  for (const t of tasks) for (const d of depList(t)){
    if (byId.has(d.id)) indeg.set(t.id, (indeg.get(t.id)||0) + 1);
  }
  const queue = [];
  for (const [id, n] of indeg) if (n === 0) queue.push(id);
  const order = [];
  const succs = new Map();
  for (const t of tasks) for (const d of depList(t)){
    if (!byId.has(d.id)) continue;
    if (!succs.has(d.id)) succs.set(d.id, []);
    succs.get(d.id).push(t.id);
  }
  while (queue.length){
    const id = queue.shift();
    order.push(id);
    for (const s of (succs.get(id) || [])){
      indeg.set(s, indeg.get(s) - 1);
      if (indeg.get(s) === 0) queue.push(s);
    }
  }
  if (order.length !== tasks.length){
    const cycleNames = tasks.filter(t => !order.includes(t.id)).map(t => t.title).slice(0,3).join(', ');
    if (typeof window !== 'undefined' && window.__showToast) window.__showToast('Circular dependency detected: ' + cycleNames, 'err');
    return tasks;
  }
  for (const id of order){
    const t = byId.get(id);
    if (!t || t.kind === 'project' || t.locked) continue;
    for (const d of depList(t)){
      const pred = byId.get(d.id); if (!pred) continue;
      const adj = applyDepConstraint(t, pred, d, calendar);
      if (adj){ t.start = adj.start; t.end = adj.end; }
    }
  }
  return Array.from(byId.values());
}

// ── Slack / float ──
function computeFloat(tasks, calendar){
  const byId=new Map(tasks.map(t=>[t.id,t]));
  const dependents=new Map();
  for(const t of tasks) for(const d of depList(t)){
    if(!dependents.has(d.id)) dependents.set(d.id,[]);
    dependents.get(d.id).push(t.id);
  }
  const projEnd=tasks.reduce((mx,t)=>t.end>mx?t.end:mx,'2020-01-01');
  const out=new Map();
  for(const t of tasks){
    if(t.kind==='project'||t.milestone){out.set(t.id,0);continue;}
    const succs=dependents.get(t.id)||[];
    if(!succs.length){out.set(t.id,Math.max(0,workingDaysBetween(t.end,projEnd,calendar)-1));continue;}
    let minF=Infinity;
    for(const sid of succs){ const s=byId.get(sid); if(s) minF=Math.min(minF, workingDaysBetween(t.end, s.start, calendar)-1); }
    out.set(t.id,Math.max(0,minF===Infinity?0:minF));
  }
  return out;
}

// ── Resource conflict detection ──
function detectConflicts(tasks){
  const byOwner=new Map();
  for(const t of tasks){
    if(!t.owner||t.kind==='project'||t.milestone||t.done) continue;
    if(!byOwner.has(t.owner)) byOwner.set(t.owner,[]);
    byOwner.get(t.owner).push(t);
  }
  const conflicts=new Set();
  for(const [,ots] of byOwner){
    for(let i=0;i<ots.length;i++) for(let j=i+1;j<ots.length;j++){
      const a=ots[i],b=ots[j];
      if(a.start<=b.end&&b.start<=a.end){conflicts.add(a.id);conflicts.add(b.id);}
    }
  }
  return conflicts;
}

// ── Auto-stagger ──
function autoStagger(tasks){
  const byOwner=new Map();
  for(const t of tasks){
    if(!t.owner||t.kind==='project'||t.milestone||t.done) continue;
    if(!byOwner.has(t.owner)) byOwner.set(t.owner,[]);
    byOwner.get(t.owner).push(t);
  }
  const updates=new Map();
  for(const [,ots] of byOwner){
    const sorted=[...ots].sort((a,b)=>a.start.localeCompare(b.start));
    let prevEnd=null;
    for(const t of sorted){
      if(prevEnd&&t.start<=prevEnd){
        const ns=addDays(prevEnd,1), dur=diffDays(t.start,t.end);
        updates.set(t.id,{start:ns,end:addDays(ns,dur)});
        prevEnd=addDays(ns,dur);
      } else { prevEnd=t.end; }
    }
  }
  if(!updates.size) return tasks;
  return tasks.map(t=>updates.has(t.id)?{...t,...updates.get(t.id)}:t);
}

// ── Auto-sort ──
function autoSort(tasks){
  const priOrd={p1:0,p2:1,p3:2};
  function cmp(a,b){
    const ad=a.done||a.status==='done'?1:0, bd=b.done||b.status==='done'?1:0;
    if(ad!==bd) return ad-bd;
    if(a.start<b.start) return -1; if(a.start>b.start) return 1;
    return (priOrd[a.priority]??1)-(priOrd[b.priority]??1);
  }
  const childMap=new Map();
  for(const t of tasks){
    const k=t.parent||'__root__';
    if(!childMap.has(k)) childMap.set(k,[]);
    childMap.get(k).push(t);
  }
  function emitSorted(parentId){
    const kids=[...(childMap.get(parentId)||[])].sort(cmp);
    const out=[];
    for(const k of kids){ out.push(k); out.push(...emitSorted(k.id)); }
    return out;
  }
  // Sets (kind:'project', parent:null) keep their original order.
  // Tasks within each set and their subtasks are sorted recursively.
  const result=[];
  const sets=(childMap.get('__root__')||[]);
  for(const s of sets){
    result.push(s);
    result.push(...emitSorted(s.id));
  }
  const seen=new Set(result.map(t=>t.id));
  tasks.filter(t=>!seen.has(t.id)).forEach(t=>result.push(t));
  return result;
}

// ── Orthogonal dep-arrow routing ──
// approachFromLeft=true (FS/SS): arrowhead points right, last segment must go rightward into child
// approachFromLeft=false (FF/SF): arrowhead points left, last segment must go leftward into child
function buildArrowPath(fromRowIdx, toRowIdx, parentX, childX, rows, axisStart, dayW, rowH, approachFromLeft=true){
  const fromY=fromRowIdx*rowH+rowH/2, toY=toRowIdx*rowH+rowH/2, CR=4;
  if(fromRowIdx===toRowIdx){
    const m=(parentX+childX)/2;
    return `M ${parentX} ${fromY} C ${m} ${fromY} ${m} ${toY} ${childX} ${toY}`;
  }
  const minR=Math.min(fromRowIdx,toRowIdx), maxR=Math.max(fromRowIdx,toRowIdx);
  const traversed=rows.slice(minR+1,maxR);
  const hitsBar=tx=>{
    for(const row of traversed){
      if(row.isProject||row.isOwnerGroup||row.milestone) continue;
      const bx=diffDays(axisStart,row.start)*dayW;
      const bw=(diffDays(row.start,row.end)+1)*dayW-2;
      if(tx>=bx-4&&tx<=bx+bw+4) return true;
    }
    return false;
  };

  let viaX=null;
  if(approachFromLeft){
    // Prefer a column between parent and child (only if parent is to the LEFT of child)
    if(parentX < childX){
      for(let off=8;off<=320;off+=6){ const tx=parentX+off; if(tx>=childX) break; if(!hitsBar(tx)){viaX=tx;break;} }
    }
    // Fallback: a column to the LEFT of child so final segment still goes right
    if(viaX===null){ for(let off=8;off<=200;off+=6){ if(!hitsBar(childX-off)){viaX=childX-off;break;} } }
    if(viaX===null) viaX=childX-10;
  } else {
    // Symmetric for FF/SF — prefer a column to the right of child
    if(parentX > childX){
      for(let off=8;off<=320;off+=6){ const tx=parentX-off; if(tx<=childX) break; if(!hitsBar(tx)){viaX=tx;break;} }
    }
    if(viaX===null){ for(let off=8;off<=200;off+=6){ if(!hitsBar(childX+off)){viaX=childX+off;break;} } }
    if(viaX===null) viaX=childX+10;
  }

  // "Backwards" case: viaX is on the far side of the parent → use 4-segment routing that escapes
  // vertically into the row gap toward the child before going horizontally, so the arrow doesn't
  // cross through the parent's own bar.
  const isBackwards = approachFromLeft ? (viaX < parentX) : (viaX > parentX);
  if(isBackwards){
    const goingDown = toY > fromY;
    const escapeY = fromY + (goingDown ? rowH/2 : -rowH/2);
    return `M ${parentX} ${fromY} L ${parentX} ${escapeY} L ${viaX} ${escapeY} L ${viaX} ${toY} L ${childX} ${toY}`;
  }

  const goingDown=toY>fromY;
  const cr=Math.min(CR,Math.abs(viaX-parentX)/2,Math.abs(childX-viaX)/2,Math.abs(toY-fromY)/2);
  const c1x=parentX<viaX?viaX-cr:viaX+cr, c1y=goingDown?fromY+cr:fromY-cr;
  const c2y=goingDown?toY-cr:toY+cr, c2x=viaX<childX?viaX+cr:viaX-cr;
  let p=`M ${parentX} ${fromY}`;
  if(cr>=1){
    p+=` L ${c1x} ${fromY} Q ${viaX} ${fromY} ${viaX} ${c1y}`;
    p+=` L ${viaX} ${c2y} Q ${viaX} ${toY} ${c2x} ${toY}`;
  } else { p+=` L ${viaX} ${fromY} L ${viaX} ${toY}`; }
  return p+` L ${childX} ${toY}`;
}

// ── Color shade helper ──
function shade(c,pct){
  if(!c) return '#000';
  let hex=c;
  if(hex.startsWith('var(')){
    const name=hex.match(/--[\w-]+/)?.[0];
    hex=name?getComputedStyle(document.documentElement).getPropertyValue(name).trim():'#14b8a6';
  }
  if(!hex.startsWith('#')) return c;
  if(hex.length===4) hex='#'+hex.slice(1).split('').map(x=>x+x).join('');
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  if(pct<0){ r=Math.round(r*(1+pct));g=Math.round(g*(1+pct));b=Math.round(b*(1+pct)); }
  else { r=Math.round(r+(255-r)*pct);g=Math.round(g+(255-g)*pct);b=Math.round(b+(255-b)*pct); }
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ── WBS numbering (auto from parent/child tree, project-order based) ──
function computeWbsMap(tasks){
  const byParent = new Map();
  for (const t of tasks){
    const k = t.parent || '__root';
    if (!byParent.has(k)) byParent.set(k, []);
    byParent.get(k).push(t);
  }
  // Preserve insertion order from `tasks` array (already grouped by project in demo).
  const out = new Map();
  // Find projects (root-level kind==='project') first, then assign children.
  const roots = (byParent.get('__root')||[]).filter(t=>t.kind==='project');
  for (const proj of roots){
    // project itself: no WBS badge
    out.set(proj.id, '');
    const walk = (parentId, prefix) => {
      const kids = byParent.get(parentId) || [];
      kids.forEach((k, i) => {
        const code = prefix ? `${prefix}.${i+1}` : `${i+1}`;
        out.set(k.id, code);
        walk(k.id, code);
      });
    };
    walk(proj.id, '');
  }
  // Orphans (tasks with no project parent) — number them sequentially as "Loose"
  const orphans = (byParent.get('__root')||[]).filter(t=>t.kind!=='project');
  orphans.forEach((o, i) => {
    out.set(o.id, `${i+1}`);
    const walk = (parentId, prefix) => {
      const kids = byParent.get(parentId) || [];
      kids.forEach((k, i) => {
        const code = `${prefix}.${i+1}`;
        out.set(k.id, code);
        walk(k.id, code);
      });
    };
    walk(o.id, `${i+1}`);
  });
  return out;
}

// ── Cost helpers ──
// Compute a single task's cost. Use explicit `cost` if set; else if task has an
// owner mapped to a known hourlyRate, compute rate × duration × 8h.
function computeTaskCost(task, ownersByName){
  if (task == null) return 0;
  if (typeof task.cost === 'number' && !isNaN(task.cost)) return task.cost;
  if (task.owner && ownersByName){
    const o = ownersByName.get(task.owner);
    if (o && typeof o.hourlyRate === 'number' && !isNaN(o.hourlyRate)){
      const dur = Math.max(1, diffDays(task.start, task.end) + 1);
      return o.hourlyRate * dur * 8;
    }
  }
  return 0;
}

function computeCostRollup(tasks, owners){
  const ownersByName = new Map((owners||[]).map(o => [o.name, o]));
  const byParent = new Map();
  for (const t of tasks){
    const k = t.parent || '__root';
    if (!byParent.has(k)) byParent.set(k, []);
    byParent.get(k).push(t);
  }
  const total = new Map(); // taskId -> rolled-up cost (self + descendants)
  const visit = (id) => {
    if (total.has(id)) return total.get(id);
    const kids = byParent.get(id) || [];
    let sum = 0;
    for (const k of kids){
      sum += visit(k.id);
    }
    const me = tasks.find(t => t.id === id);
    if (me && me.kind !== 'project') sum += computeTaskCost(me, ownersByName);
    total.set(id, sum);
    return sum;
  };
  for (const t of tasks) visit(t.id);
  // Project totals — sum of their children
  let grand = 0;
  for (const t of tasks){
    if (t.kind === 'project') grand += total.get(t.id) || 0;
    else if (!t.parent) grand += total.get(t.id) || 0;
  }
  return { perTask: total, grand };
}

function formatCost(n){
  if (typeof n !== 'number' || !isFinite(n) || n === 0) return '$0';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
  if (n >= 1000) return '$' + Math.round(n/100)/10 + 'k';
  return '$' + Math.round(n).toLocaleString();
}

// ── Date helpers for recurrence ──
// Add n months to a ymd date. Preserves day-of-month where possible; if the
// target month is shorter, snaps to the last day of that month (e.g. Jan 31 + 1mo = Feb 28).
function addMonths(s, n){
  const d = parseYmd(s);
  const targetMonth = d.getMonth() + n;
  const targetY = d.getFullYear() + Math.floor(targetMonth / 12);
  const targetM = ((targetMonth % 12) + 12) % 12;
  const dayOrig = d.getDate();
  // Last day of target month
  const lastDay = new Date(targetY, targetM + 1, 0).getDate();
  const day = Math.min(dayOrig, lastDay);
  const nd = new Date(targetY, targetM, day);
  return ymd(nd);
}

// ── Recurring task expansion ──
// For each task with task.recurrence != null, generate count-1 additional virtual
// instances (recurrenceParent: sourceId, recurrence: null, derived id/title).
// Virtual instances inherit all other fields; deps are stripped on instances so
// the cascade/scheduler doesn't try to reshape them.
function expandRecurring(tasks, calendar){
  const out = [];
  for (const t of tasks){
    out.push(t);
    const r = t.recurrence;
    if (!r || !r.pattern || !r.count || r.count < 2) continue;
    const interval = Math.max(1, r.interval || 1);
    const count = Math.max(1, Math.floor(r.count));
    for (let n = 1; n < count; n++){
      let nStart, nEnd;
      if (r.pattern === 'daily'){
        nStart = addDays(t.start, n * interval);
        nEnd   = addDays(t.end,   n * interval);
      } else if (r.pattern === 'weekly'){
        nStart = addDays(t.start, n * interval * 7);
        nEnd   = addDays(t.end,   n * interval * 7);
      } else if (r.pattern === 'monthly'){
        nStart = addMonths(t.start, n * interval);
        nEnd   = addMonths(t.end,   n * interval);
      } else {
        continue;
      }
      out.push({
        ...t,
        id: `${t.id}-occ-${n}`,
        title: `${t.title} (${n+1}/${count})`,
        start: nStart,
        end: nEnd,
        recurrenceParent: t.id,
        recurrence: null,
        baselineEnd: undefined,
        deps: [],
      });
    }
  }
  return out;
}

// ── Project template helpers (localStorage-backed, cross-workspace) ──
const TEMPLATES_KEY = 'timeline-templates-v1';

function loadTemplates(){
  try {
    const raw = localStorage.getItem(TEMPLATES_KEY);
    if (!raw) return [];
    const obj = JSON.parse(raw);
    if (!obj || !Array.isArray(obj.templates)) return [];
    return obj.templates;
  } catch(_){
    return [];
  }
}

function saveTemplates(arr){
  try {
    localStorage.setItem(TEMPLATES_KEY, JSON.stringify({ templates: arr }));
    return true;
  } catch(e){
    return false;
  }
}

// Sanitize a project record into a template. Strips volatile fields, replaces
// IDs with stable index-based slugs (t1, t2, …) and re-anchors all task dates
// so the earliest task starts on a fixed reference day (2000-01-01). On
// instantiation the user picks a start date and we re-offset forward.
const TEMPLATE_ANCHOR = '2000-01-01';

function sanitizeForTemplate(project){
  if (!project) return null;
  const tasks = Array.isArray(project.tasks) ? project.tasks : [];
  // Find earliest start
  let earliest = null;
  for (const t of tasks){
    if (!t.start) continue;
    if (earliest == null || t.start < earliest) earliest = t.start;
  }
  const anchor = earliest || TEMPLATE_ANCHOR;
  const offset = diffDays(anchor, TEMPLATE_ANCHOR); // days to add
  // Build id->slug map (project tasks get tN, projects pN)
  const idMap = new Map();
  let pCnt = 1, tCnt = 1;
  for (const t of tasks){
    if (t.kind === 'project') idMap.set(t.id, 'p' + (pCnt++));
    else idMap.set(t.id, 't' + (tCnt++));
  }
  const slugTasks = tasks.map(t => {
    const newId = idMap.get(t.id) || t.id;
    const newParent = t.parent ? (idMap.get(t.parent) || null) : null;
    const newDeps = (t.deps || []).map(d => {
      const nd = normalizeDep(d);
      if (!nd) return null;
      const mapped = idMap.get(nd.id);
      if (!mapped) return null; // skip dangling
      return {...nd, id: mapped};
    }).filter(Boolean);
    // Re-anchor dates
    const newStart = t.start ? addDays(t.start, offset) : t.start;
    const newEnd   = t.end   ? addDays(t.end,   offset) : t.end;
    const clean = {...t, id: newId, parent: newParent, deps: newDeps, start: newStart, end: newEnd};
    // Strip volatile/derived fields
    delete clean.baselineEnd;
    return clean;
  });
  return {
    name: project.name || 'Untitled',
    color: project.color || '#7c3aed',
    tasks: slugTasks,
    owners: (project.owners || []).map(o => ({...o})),
    calendar: project.calendar ? {
      workingDays: [...(project.calendar.workingDays || DEFAULT_CALENDAR.workingDays)],
      holidays: [...(project.calendar.holidays || [])],
    } : {...DEFAULT_CALENDAR, holidays: [...DEFAULT_CALENDAR.holidays]},
    autoSchedule: project.autoSchedule || 'cascade',
  };
}

// Instantiate: clone sanitized template, regenerate IDs, offset dates from
// TEMPLATE_ANCHOR forward to user-picked startDate.
function instantiateTemplate(template, name, startDate){
  const src = template.project;
  if (!src) return null;
  const tasks = Array.isArray(src.tasks) ? src.tasks : [];
  const offset = diffDays(TEMPLATE_ANCHOR, startDate);
  // Build slug -> fresh id map
  const idMap = new Map();
  for (const t of tasks){
    const prefix = t.kind === 'project' ? 'p' : 't';
    idMap.set(t.id, prefix + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6));
  }
  const newTasks = tasks.map(t => {
    const newId = idMap.get(t.id) || t.id;
    const newParent = t.parent ? (idMap.get(t.parent) || null) : null;
    const newDeps = (t.deps || []).map(d => {
      const nd = normalizeDep(d);
      if (!nd) return null;
      const mapped = idMap.get(nd.id);
      if (!mapped) return null;
      return {...nd, id: mapped};
    }).filter(Boolean);
    const newStart = t.start ? addDays(t.start, offset) : t.start;
    const newEnd   = t.end   ? addDays(t.end,   offset) : t.end;
    return {...t, id: newId, parent: newParent, deps: newDeps, start: newStart, end: newEnd};
  });
  return {
    id: genId('proj-'),
    name: name || src.name || 'New project',
    color: src.color || '#7c3aed',
    created: todayStr,
    baseline: null,
    tasks: newTasks,
    owners: (src.owners || []).map(o => ({...o})),
    calendar: src.calendar ? {
      workingDays: [...(src.calendar.workingDays || DEFAULT_CALENDAR.workingDays)],
      holidays: [...(src.calendar.holidays || [])],
    } : {...DEFAULT_CALENDAR, holidays: [...DEFAULT_CALENDAR.holidays]},
    autoSchedule: src.autoSchedule || 'cascade',
  };
}

Object.assign(window,{
  DAY_MS,TODAY,todayStr,
  ymd,parseYmd,addDays,diffDays,fmtShort,isWeekend,
  DOW,MONTHS,DEMO_TASKS,
  DEFAULT_CALENDAR, isWorkingDay, workingDaysBetween, addWorkingDays, formatDuration,
  normalizeDep, depList,
  buildRows,buildRowsByProject,buildRowsByOwner,migrateOrphans,
  computeCriticalPath,computeAtRisk,getHealth,getDepChain,
  cascadeAfterMove,fullAutoSchedule,computeFloat,detectConflicts,autoStagger,
  buildArrowPath,shade,
  genId, newProject, sampleWorkspace, serializeWorkspace, parseWorkspace,
  CURRENT_VERSION, MIGRATIONS, migrateWorkspace,
  STATUSES, STATUS_META, normalizeStatus, syncDoneFromStatus,
  taskChildren, taskHasChildren, taskDescendants, computeSubtaskRollup,
  getEffectiveCalendarForOwner,
  computeWbsMap, computeTaskCost, computeCostRollup, formatCost,
  addMonths, expandRecurring,
  loadTemplates, saveTemplates, sanitizeForTemplate, instantiateTemplate,
});
</script>

<script type="text/babel">
const { useState: _useState2, useEffect: _useEffect2, useRef: _useRef2, useCallback: _useCallback2 } = React;

  const ref = _useRef2(null);
  const [vp, setVp] = _useState2({l:0,w:100});

  _useEffect2(()=>{

    };
    const grid=gridScrollRef.current; if(!grid) return;
    grid.addEventListener('scroll',update,{passive:true});

  const nDays=axis.days.length;
  const toLeft = d=>`${window.diffDays(axis.start,d)/nDays*100}%`;
  const toPct  = (s,e)=>`${(window.diffDays(s,e)+1)/nDays*100}%`;
  const todayL = `${window.diffDays(axis.start,window.todayStr)/nDays*100}%`;

  const taskRows=rows.filter(r=>!r.isProject&&!r.isOwnerGroup);
  const barH=Math.min(4,Math.max(1.5, 32/Math.max(1,taskRows.length)));
  let y=0;
  const barItems=taskRows.map(r=>{ const my=y; y+=barH+0.5; return {r,my}; });

  return (
    <div className="minimap-strip" ref={ref} onClick={jump} title="Click to navigate">
      <div className="minimap-track">
        {barItems.map(({r,my})=>(
          <div key={r.id} className="minimap-bar" style={{
            left:toLeft(r.start),

            background:r.done?'var(--t4)':(r.color||'#96c6e8'),
            opacity:r.done?.35:.85,
            borderRadius:r.milestone?'50%':'1px',

        ))}
        <div className="minimap-today" style={{left:todayL}}/>
        <div className="minimap-viewport" style={{left:vp.l+'px',width:vp.w+'px'}}/>

const DOW_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function GanttTweaks({ tw, setTweak, activeProject, updateActiveProject, customConfirm }){
  if(!window.TweaksPanel) return null;
  const { TweaksPanel, TweakSection, TweakSlider, TweakToggle, TweakSelect, TweakRadio, TweakButton } = window;
  const DEFAULT_CAL = window.DEFAULT_CALENDAR;
  const calendar = activeProject?.calendar ?? DEFAULT_CAL;
  const workingDays = Array.isArray(calendar.workingDays) ? calendar.workingDays : DEFAULT_CAL.workingDays;
  const holidays = Array.isArray(calendar.holidays) ? calendar.holidays : [];
  const autoSchedule = activeProject?.autoSchedule || 'cascade';

  const toggleDow = (d) => {
    if (!activeProject) return;
    const has = workingDays.includes(d);
    const nx = has ? workingDays.filter(x=>x!==d) : [...workingDays, d].sort((a,b)=>a-b);
    updateActiveProject({ calendar: { workingDays: nx, holidays } });
  };
  const setHolidayAt = (idx, val) => {
    if (!activeProject) return;

// ── Phase B1: Command palette ──
// Generic palette over an action registry. Each command: {id,label,group,shortcut?,keywords?,run}.
// Filters by case-insensitive substring against label + group + keywords. Arrow keys / Enter / Esc.
// Mouse + keyboard share the active index so hover and arrow nav agree.
function CommandPalette({ commands, onClose }){
  const [query, setQuery] = useState('');
  const [active, setActive] = useState(0);
  const inputRef = useRef(null);
  const listRef = useRef(null);
  useEffect(()=>{ inputRef.current?.focus(); }, []);

  const filtered = useMemo(()=>{
    const q = query.trim().toLowerCase();
    if (!q) return commands;
    return commands.filter(c => {
      const hay = `${c.label} ${c.group||''} ${(c.keywords||[]).join(' ')}`.toLowerCase();
      // Split query so "save proj" matches "Save project as".
      return q.split(/\s+/).every(term => hay.includes(term));
    });
  }, [commands, query]);

  // Clamp active when filter shrinks the list.
  useEffect(()=>{ setActive(a => Math.min(a, Math.max(0, filtered.length - 1))); }, [filtered.length]);
  useEffect(()=>{
    const el = listRef.current?.querySelector(`[data-idx="${active}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  }, [active]);

  const run = useCallback((cmd)=>{
    if (!cmd) return;
    onClose();
    // Defer so the palette unmounts before the action fires (avoids focus jitter).
    setTimeout(() => { try { cmd.run(); } catch(e){ console.error('Command failed:', cmd.id, e); } }, 0);
  }, [onClose]);

  const onKey = useCallback((e) => {
    if (e.key === 'Escape') { e.preventDefault(); onClose(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); setActive(a => Math.min(a + 1, filtered.length - 1)); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); setActive(a => Math.max(a - 1, 0)); return; }
    if (e.key === 'Enter')     { e.preventDefault(); run(filtered[active]); return; }
  }, [filtered, active, run, onClose]);

  // Group rows by group while preserving filter order.
  const rows = useMemo(()=>{
    const out = [];
    let lastGroup = null;
    filtered.forEach((c, i) => {
      if (c.group && c.group !== lastGroup){ out.push({type:'group', label:c.group}); lastGroup = c.group; }
      else if (!c.group && lastGroup !== ''){ lastGroup = ''; }
      out.push({type:'item', cmd:c, idx:i});
    });
    return out;
  }, [filtered]);

  return (
    <div className="palette-overlay" onMouseDown={onClose}>
      <div className="palette" onMouseDown={e=>e.stopPropagation()}>
        <div className="p-input-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input ref={inputRef} className="p-input" placeholder="Type a command…" value={query}
            onChange={e=>setQuery(e.target.value)} onKeyDown={onKey}/>
          <span className="p-input-hint">{filtered.length}</span>
        </div>
        <div className="p-list" ref={listRef} role="listbox">
          {filtered.length === 0 ? (
            <div className="p-empty">No commands match "{query}"</div>
          ) : rows.map((r, i) => r.type === 'group' ? (
            <div key={'g'+i} className="p-group-title">{r.label}</div>
          ) : (
            <div key={r.cmd.id} className={`p-item${r.idx===active?' active':''}`} data-idx={r.idx}
              role="option" aria-selected={r.idx===active}
              onMouseEnter={()=>setActive(r.idx)} onClick={()=>run(r.cmd)}>
              <span className="p-label">{r.cmd.label}</span>
              {r.cmd.shortcut && <span className="p-shortcut">{r.cmd.shortcut}</span>}
            </div>
          ))}
        </div>
        <div className="p-foot">
          <span><span className="p-key">↑↓</span>navigate</span>
          <span><span className="p-key">↵</span>run</span>
          <span><span className="p-key">Esc</span>close</span>
        </div>
      </div>
    </div>
  );
}

// ── IndexedDB helpers for persisting FileSystemFileHandle across sessions ──
const IDB_DB = 'timeline-files', IDB_STORE = 'handles';
const CURRENT_HANDLE_KEY = 'gantt-current-handle';
function idbOpen() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_DB, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => res(req.result);
    req.onerror   = () => rej(req.error);
  });
}
async function idbPut(id, val) {
  const db = await idbOpen();
  return new Promise((r,j) => { const tx=db.transaction(IDB_STORE,'readwrite'); tx.objectStore(IDB_STORE).put(val,id); tx.oncomplete=r; tx.onerror=()=>j(tx.error); });
}
async function idbGet(id) {
  const db = await idbOpen();
  return new Promise((r,j) => { const tx=db.transaction(IDB_STORE,'readonly'); const rq=tx.objectStore(IDB_STORE).get(id); rq.onsuccess=()=>r(rq.result); rq.onerror=()=>j(rq.error); });
}
async function idbDel(id) {
  const db = await idbOpen();
  return new Promise((r,j) => { const tx=db.transaction(IDB_STORE,'readwrite'); tx.objectStore(IDB_STORE).delete(id); tx.oncomplete=r; tx.onerror=()=>j(tx.error); });
}

  const RECENTS_KEY = 'timeline-recents-v1';

  });
  const persistRecents = useCallback((next) => {

  }, []);
  const pushRecent = useCallback(async (name, handle) => {
    const id = crypto.randomUUID();
    const entry = { id, name, savedAt: Date.now(), hasHandle: !!handle };
    const prev = recents.filter(e => e.name !== name);
    const next = [entry, ...prev].slice(0, RECENTS_MAX);
    // Drop IDB handles for evicted entries
    const evicted = prev.slice(RECENTS_MAX - 1);
    for (const ev of evicted) { if (ev.hasHandle) idbDel(ev.id); }
    if (handle) { try { await idbPut(id, handle); } catch(_) {} }
    persistRecents(next);
  }, [recents, persistRecents]);

    const entry = recents.find(e => e.id === id);
