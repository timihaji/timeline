            ? <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            : <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          }
        </button>

        {/* Settings */}
        <button className="tb-icon-btn" title="Settings (Ctrl/Cmd+,)" onClick={()=>window.postMessage({type:'__toggle_edit_mode'},'*')}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>

        <button className="tb-btn primary"
                disabled={!activeProject}
                onClick={()=>{
                  if(!activeProject) return;
                  const nid='task-'+Date.now().toString(36);
                  let proj = null;
                  if (selected) {
                    const st = tasks.find(t => t.id === selected);
                    if (st && st.kind !== 'project' && st.project) proj = st.project;
                  }
                  if (proj == null) {
                    for (let i = tasks.length - 1; i >= 0; i--) {
                      const t = tasks[i];
                      if (t.kind !== 'project' && t.project) { proj = t.project; break; }
                    }
                  }
                  const startD = isWorkingDay(todayStr, calendar) ? todayStr : addWorkingDays(todayStr, 0, calendar);
                  const endD = addWorkingDays(startD, 2, calendar);
                  const nt={id:nid,parent:null,project:proj,title:'New task',start:startD,end:endD,priority:'p3',progress:0,color:'#96c6e8'};
                  updateTasks(ts=>[...ts,nt]); setSelected(nid); setRenaming({id:nid,value:nt.title});
                }}>+ New task</button>
      </div>

      {/* ── Body ── */}
      <div className="body">

        {/* Project panel */}
        <div className={`proj-panel${projectPanelOpen?'':' collapsed'}`}>
          <div className="proj-panel-hdr">
            {projectPanelOpen && <span className="proj-panel-title">Projects</span>}
            <button className="proj-panel-toggle" onClick={()=>setProjectPanelOpen(o=>!o)}
                    title={projectPanelOpen?'Collapse':'Expand'}>
              {projectPanelOpen?'‹':'›'}
            </button>
          </div>
          {projectPanelOpen && (
            <div className="proj-panel-body">
              {projects.length===0 && <div className="proj-empty">No projects yet</div>}
              {projects.map(p=>{
                const isRenaming = projRenaming?.id===p.id;
                const cnt = p.tasks.filter(t=>!t.kind).length;
                return (
                  <div key={p.id}
                       className={`proj-item${activeProjectId===p.id?' active':''}`}
                       onClick={()=>switchProject(p.id)}
                       onDoubleClick={()=>setProjRenaming({id:p.id,value:p.name})}
                       onContextMenu={e=>{e.preventDefault();setProjCtxMenu({x:e.clientX,y:e.clientY,projectId:p.id});}}>
                    <span className="proj-item-dot" style={{background:p.color||'#96c6e8'}}/>
                    {isRenaming
                      ? <input className="proj-rename-input" autoFocus
                          value={projRenaming.value}
                          onChange={e=>setProjRenaming({...projRenaming,value:e.target.value})}
                          onBlur={()=>{const v=projRenaming.value.trim();if(v)updateProjectById(p.id,{name:v});setProjRenaming(null);}}
                          onKeyDown={e=>{
                            if(e.key==='Enter'){const v=projRenaming.value.trim();if(v)updateProjectById(p.id,{name:v});setProjRenaming(null);}
                            if(e.key==='Escape')setProjRenaming(null);
                            e.stopPropagation();
                          }}
                          onClick={e=>e.stopPropagation()}/>
                      : <>
                          <span className="proj-item-name">{p.name}</span>
                          <span className="proj-item-cnt">{cnt}</span>
                        </>
                    }
                  </div>
                );
              })}
              <button className="proj-add-btn" onClick={()=>createNewProject()}>+ New project</button>
            </div>
          )}
        </div>

        {/* Work area: shared filter strip above the LP+RP row so both panes have equal header overhead */}
        <div className="work-area">
          {/* Filter strip (Batch 4) — moved out of rpane so LP/RP alignment is wrap-proof */}
          {activeProject && (
            <SearchFilterBar filter={filter} setFilter={setFilter} owners={owners}
              totalCount={totalTaskCount} visibleCount={visibleTaskCount}/>
          )}
          <div className="work-row">

        {/* Left task pane */}
        <div className="lpane">
          <div className="lpane-hdr">
            <h2>Tasks</h2>
            <button className="lpane-add-btn" title="New set" disabled={!activeProject} onClick={addGroup}>+</button>
            <span className="pill">{tasks.filter(t=>!t.kind).length} items</span>
          </div>
          {viewMode === 'gantt' && showMinimap && activeProject && rows.length>0 && (
            <div className="lpane-minimap-spacer" aria-hidden="true"/>
          )}
          <div className="lpane-body" ref={lpaneBodyRef} onScroll={onLpaneScroll} style={{minWidth:0}}>
            {!activeProject && (
              <div style={{padding:'24px 14px',color:'var(--t4)',fontSize:11,fontStyle:'italic'}}>
                Select a project on the left, or create a new one.
              </div>
            )}
            {rows.map((r)=>{
              if(r.isProject){
                const open=!collapsed.has(r.id);
                const cnt = r.id==='__loose'
                  ? tasks.filter(t=>!t.parent && t.kind!=='project').length
                  : tasks.filter(t=>t.parent===r.id).length;
                const projCost = costRoll.perTask.get(r.id) || 0;
                return (
                  <div className="group-row" data-pid={r.project} key={r.id}
                    style={r.color?{boxShadow:`inset 3px 0 0 ${r.color}`}:undefined}
                    onClick={()=>setCollapsed(c=>{const n=new Set(c);n.has(r.id)?n.delete(r.id):n.add(r.id);return n;})}>
                    <svg className={`group-chv${open?' open':''}`} viewBox="0 0 24 24" fill="none" stroke={r.color||'currentColor'} strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                    <span className="group-dot" style={r.color?{background:r.color}:undefined}/>
                    {groupRenaming?.id===r.id
                      ? <input className="row-rename" autoFocus value={groupRenaming.value}
                          onChange={e=>setGroupRenaming(g=>({...g,value:e.target.value}))}
                          onKeyDown={e=>{if(e.key==='Enter')commitGroupRename();if(e.key==='Escape')setGroupRenaming(null);e.stopPropagation();}}
                          onBlur={commitGroupRename}
                          onClick={e=>e.stopPropagation()}/>
                      : <span className="group-name">{r.title}</span>
                    }
                    {projCost>0 && <span className="group-cost" title={`Rollup cost`}>{formatCost(projCost)} total</span>}
                    <div className="grp-add" title="Add task to this set"
                      onClick={e=>{e.stopPropagation();addTaskToGroup({kind:'project',groupId:r.id,title:r.title});}}>+</div>
                    <div className="grp-kebab" title="Set options"
                      onClick={e=>{e.stopPropagation();setGroupCtxMenu({x:e.clientX,y:e.clientY,groupId:r.id,kind:'project',title:r.title});}}>&#xFE19;</div>
                    <span className="group-cnt">{cnt}</span>
                  </div>
                );
              }
              if(r.isOwnerGroup){
                const open=!collapsed.has(r.id);
                const cnt=tasks.filter(t=>!t.kind&&t.owner===r.owner).length;
                return (
                  <div className="owner-group-row" key={r.id} data-owner={r.owner}
                    onClick={()=>setCollapsed(c=>{const n=new Set(c);n.has(r.id)?n.delete(r.id):n.add(r.id);return n;})}>
                    <svg className={`group-chv${open?' open':''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                    <div className="owner-avatar" style={{background:r.color+'33',borderColor:r.color+'88',color:r.color}}>{r.owner.slice(0,2).toUpperCase()}</div>
                    {groupRenaming?.id===r.id
                      ? <input className="row-rename" autoFocus value={groupRenaming.value}
                          onChange={e=>setGroupRenaming(g=>({...g,value:e.target.value}))}
                          onKeyDown={e=>{if(e.key==='Enter')commitGroupRename();if(e.key==='Escape')setGroupRenaming(null);e.stopPropagation();}}
                          onBlur={commitGroupRename}
                          onClick={e=>e.stopPropagation()}/>
                      : <span className="group-name">{r.owner}</span>
                    }
                    <div className="grp-add" title="Add task to this set"
                      onClick={e=>{e.stopPropagation();addTaskToGroup({kind:'owner',groupId:r.id,title:r.owner});}}>+</div>
                    <div className="grp-kebab" title="Set options"
                      onClick={e=>{e.stopPropagation();setGroupCtxMenu({x:e.clientX,y:e.clientY,groupId:r.id,kind:'owner',title:r.owner});}}>&#xFE19;</div>
                    <span className="group-cnt">{cnt}</span>
                  </div>
                );
              }
              const sel=selected===r.id||selectedSet.has(r.id), isRen=renaming?.id===r.id;
              const wbsCode = wbsMap.get(r.id);
              const isRecurInst = !!r.recurrenceParent;
              return (
                <div className={`task-row is-child${r.done?' done':''}${sel?' selected':''}${selectedSet.has(r.id)&&selectedSet.size>1?' multi-sel':''}${hoverRow===r.id?' hover':''}`} key={r.id}
                  data-task-id={r.id} data-depth={r.depth||1}
                  style={{paddingLeft: 22 + ((r.depth||1) * INDENT_PX), ...(isRecurInst?{opacity:.6}:null)}}
                  onMouseEnter={()=>setHoverRow(r.id)} onMouseLeave={()=>setHoverRow(null)}
                  onClick={(e)=>{
                    const mod = e.metaKey || e.ctrlKey;
                    if(e.shiftKey && selAnchorRef.current){
                      // Shift+click: range select between anchor and clicked row over the
                      // currently visible task rows (skip project / owner section headers).
                      const ids = rows.filter(rr => rr.id && !rr.isProject && !rr.isOwnerGroup).map(rr => rr.id);
                      const a = ids.indexOf(selAnchorRef.current);
                      const b = ids.indexOf(r.id);
                      if(a >= 0 && b >= 0){
                        const lo = Math.min(a,b), hi = Math.max(a,b);
                        setSelectedSet(new Set(ids.slice(lo, hi+1)));
                        setSelected(r.id);
                        return;
                      }
                      // Anchor stale (row no longer visible) — fall through to single-select
                    }
                    if(mod){
                      // Ctrl/Cmd+click: toggle individual row in the set; anchor follows the click.
                      setSelectedSet(prev=>{
                        const n=new Set(prev);
                        if(n.has(r.id)){
                          n.delete(r.id);
                          if(selected===r.id){ const next=n.values().next().value; setSelected(next||null); }
                        } else {
                          n.add(r.id);
                          setSelected(r.id);
                        }
                        return n;
                      });
                      selAnchorRef.current = r.id;
                      return;
                    }
                    setSelected(r.id);
                    setSelectedSet(new Set([r.id]));
                    selAnchorRef.current = r.id;
                  }}
                  onDoubleClick={()=>{ if(isRecurInst) return; setRenaming({id:r.id,value:r.title}); }}
                  onContextMenu={e=>{e.preventDefault();if(isRecurInst)return;if(!selectedSet.has(r.id)){setSelected(r.id);setSelectedSet(new Set([r.id]));selAnchorRef.current=r.id;}setCtxMenu({x:e.clientX,y:e.clientY,taskId:r.id});}}>
                  {r.isSummary && (
                    <span className={`task-chv${collapsed.has(r.id)?'':' open'}`}
                          title={collapsed.has(r.id)?'Expand':'Collapse'}
                          style={{left: (22 + ((r.depth||1)-1)*INDENT_PX - 2) + 'px'}}
                          onClick={e=>{e.stopPropagation();setCollapsed(c=>{const n=new Set(c);n.has(r.id)?n.delete(r.id):n.add(r.id);return n;});}}>
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                    </span>
                  )}
                  <span className={`chk${r.done?' done':''}`} onClick={e=>{e.stopPropagation();if(isRecurInst)return;updateTasks(ts=>ts.map(t=>t.id===r.id?{...t,done:!t.done,progress:!t.done?1:(t.progress||0)}:t));}}/>
                  {wbsCode && <span className="wbs" title={`WBS ${wbsCode}`}>{wbsCode}</span>}
                  {isRen
                    ?<input className="row-rename" autoFocus value={renaming.value} onChange={e=>setRenaming({...renaming,value:e.target.value})} onBlur={commitRename} onClick={e=>e.stopPropagation()} onKeyDown={e=>{if(e.key==='Enter')commitRename();if(e.key==='Escape')setRenaming(null);e.stopPropagation();}}/>
                    :<span className="ttl">{isRecurInst && <span style={{color:'var(--accent-2)',marginRight:4}}>↻</span>}{r.title}</span>
                  }
                  <span className="pri" title={`Priority ${r.priority}`}>
                    {[3,6,9].slice(0,r.priority==='p1'?3:r.priority==='p2'?2:1).map((h,i)=>(
                      <span key={i} className="pri-bar" style={{height:h+'px',background:r.priority==='p1'?'var(--p1)':r.priority==='p2'?'var(--p2)':'var(--p3)'}}/>
                    ))}
                  </span>
                </div>
              );
            })}
          </div>
        </div>

        {/* Right pane */}
        <div className="rpane">

          {/* ── LIST VIEW ── */}
          {viewMode === 'list' && activeProject && (
            <ListView tasks={tasks} expandedTasks={tasksForRows}
              wbsMap={wbsMap} owners={owners}
              selected={selected} selectedSet={selectedSet}
              setSelected={setSelected} setSelectedSet={setSelectedSet}
              updateTasks={updateTasks} applySchedule={applySchedule}
              calendar={calendar} setCtxMenu={setCtxMenu} addOwnerToList={addOwnerToList}/>
          )}

          {/* ── CALENDAR VIEW ── */}
          {viewMode === 'calendar' && activeProject && (
            <CalendarView tasks={tasks} expandedTasks={tasksForRows}
              calendar={calendar}
              selected={selected} selectedSet={selectedSet}
              setSelected={setSelected} setSelectedSet={setSelectedSet}
              setCtxMenu={setCtxMenu}/>
          )}

          {viewMode === 'gantt' && showMinimap && activeProject && rows.length>0 && <Minimap rows={rows} axis={axis} dayW={dayW} totalW={totalW} gridScrollRef={gridScrollRef}/>}

          {/* Timeline header — Gantt only */}
          {viewMode === 'gantt' && (<div className="timeline-hdr">
            <div className="hdr-scroll" ref={hdrScrollRef}>
              <div className="hdr-track" style={{width:totalW+'px'}}>
                {monthSpans.map((m,i)=>(
                  <div key={i} className="hdr-month" style={{left:m.idx*dayW+'px',width:m.len*dayW+'px'}}>
                    {m.label}<span className="yr">{m.year}</span>
                  </div>
                ))}
                {axis.days.map((d,i)=>{
                  const we=isWeekend(d), dt=parseYmd(d), isToday=d===todayStr, ms=dt.getDate()===1;
                  return (
                    <div key={d} className={`hdr-day${we?' weekend':''}${isToday?' today':''}${ms?' month-start':''}${tinyCol?' tiny':''}`}
                      style={{left:i*dayW+'px',width:dayW+'px'}}>
                      {!tinyCol&&<div className="dow">{smallCol?DOW[dt.getDay()][0]:DOW[dt.getDay()]}</div>}
                      {!tinyCol&&<div className="dom">{dt.getDate()}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>)}

          {/* Grid */}
          {viewMode === 'gantt' && (<div className="grid-scroll" ref={gridScrollRef} onScroll={onGridScroll} onPointerDown={onGridPointerDown} onDoubleClick={onGridDblClick}
            onContextMenu={e=>{
              // Let bar / dep-path / handle handlers win on their own elements
              if(e.target.closest && e.target.closest('[data-bar-id], .bar, .bar-handle, .dep-path, .dep-knob')) return;
              const grid=gridScrollRef.current; if(!grid) return;
              const rect=grid.getBoundingClientRect();
              const lx=e.clientX-rect.left+grid.scrollLeft;
              const ly=e.clientY-rect.top+grid.scrollTop;
              const dayIdx=Math.max(0,Math.min(axis.days.length-1,Math.floor(lx/dayW)));
              const rowIdx=Math.floor(ly/rowH);
              const day=axis.days[dayIdx];
              if(!day) return;
              e.preventDefault();
              setGridCtxMenu({x:e.clientX,y:e.clientY,day,rowIdx});
            }}>
            <div className="grid-track" style={{width:totalW+'px',height:Math.max(200, rows.length*rowH)+'px'}}>

              {!activeProject && (
                <div className="empty-state">
                  <h3>No project selected</h3>
                  <div>Pick or create a project on the left.</div>
                </div>
              )}
              {activeProject && rows.length===0 && (
                <div className="empty-state">
                  <h3>{activeProject.name}</h3>
                  <div>Drag on an empty row to create a task — or use + New task.</div>
                </div>
              )}

              {/* Background layer */}
              <div className="grid-bg">
                {axis.days.map((d,i)=>{
                  const we=isWeekend(d)&&tw.showWeekends!==false, ms=parseYmd(d).getDate()===1;
                  return <div key={d} className={`grid-col${we?' weekend':''}${ms?' month-start':''}`} style={{left:i*dayW+'px',width:dayW+'px'}}/>;
                })}
                <div className="today-line" style={{left:xForDay(todayStr)+dayW*(tw.todayLineLive!==false?(now.getHours()*3600+now.getMinutes()*60)/86400:0.5)+'px'}}/>
                {sprintBands.map(band=>(
                  <Fragment key={'sb'+band.dayIdx}>
                    {band.isEven&&<div className="sprint-band even" style={{left:band.dayIdx*dayW+'px',width:Math.min(7,axis.days.length-band.dayIdx)*dayW+'px'}}/>}
                    <div className={`sprint-bound${band.n%2===0?' release':''}`} data-label={band.label} style={{left:band.dayIdx*dayW+'px'}}/>
                  </Fragment>
                ))}
                {rows.filter(r=>r.milestone).map(ms=>(
                  <div key={'rib-'+ms.id} className={`milestone-ribbon${ms.done?' done-ribbon':''}`} data-label={ms.title}
                    style={{left:xForDay(ms.start)+dayW/2-1+'px','--ribbon-c':ms.color||'#96c6e8'}}/>
                ))}
                {hoveredBarId&&(()=>{ const row=rows.find(r=>r.id===hoveredBarId); if(!row||row.isProject)return null; return <div className="hover-guide-band" style={{left:xForDay(row.start)+'px',width:(row.milestone?dayW:(diffDays(row.start,row.end)+1)*dayW)+'px'}}/>; })()}
                {rows.map((r,i)=>(
                  <div key={r.id} className={`row-line${r.isProject||r.isOwnerGroup?' group':''}${selected===r.id?' selected-row':''}`} style={{top:i*rowH+'px'}}/>
                ))}
                {showNowCurtain&&<div className="now-curtain" style={{width:Math.max(0,xForDay(todayStr)+dayW/2)+'px'}}/>}
                {showFloat&&rows.map((r,i)=>{
                  if(r.isProject||r.isOwnerGroup||r.milestone||r.done)return null;
                  const fl=floatMap.get(r.id)||0; if(fl<=0)return null;
                  const live=livePreview(r); const end=live?live.end:r.end;
                  const bg=r.color||'#96c6e8';
                  return <div key={'fg-'+r.id} className="float-ghost" style={{left:xForDay(addDays(end,1))+'px',width:fl*dayW+'px',top:i*rowH+(rowH-22)/2+'px',background:`linear-gradient(to right,${bg}55,transparent)`}}/>;
                })}
                {showProbBars&&rows.map((r,i)=>{
                  if(!r.pessimistic||r.isProject||r.milestone)return null;
                  const live=livePreview(r); const end=live?live.end:r.end;
                  const bg=r.color||'#96c6e8';
                  return <div key={'pt-'+r.id} className="prob-tail" style={{left:xForDay(end)+'px',width:r.pessimistic*dayW+'px',top:i*rowH+(rowH-22)/2+'px',background:`linear-gradient(to right,${bg}99,${bg}33,transparent)`}}/>;
                })}
                {baseline&&rows.map((r,i)=>{
                  if(r.isProject||r.isOwnerGroup||r.milestone)return null;
                  const bl=baseline.get(r.id); if(!bl)return null;
                  if(bl.start===r.start&&bl.end===r.end)return null;
                  const slip=bl.end<r.end;
                  return <div key={'bl-'+r.id} className="baseline-bar" title={`Baseline: ${fmtShort(bl.start)} → ${fmtShort(bl.end)}`}
                    style={{left:xForDay(bl.start)+'px',width:(diffDays(bl.start,bl.end)+1)*dayW-2+'px',top:i*rowH+(rowH-22)/2+20+'px',background:slip?'var(--p2)':'var(--t4)'}}/>;
                })}
                {snapInfo&&<div className="snap-guide-mag" style={{left:snapInfo.x+'px'}}/>}
              </div>

              {/* Dependency SVG */}
              {tw.showDeps!==false&&(
                <svg className="dep-svg" width={totalW} height={rows.length*rowH}>
                  <defs>
                    <marker id="dep-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#66837c"/></marker>
                    <marker id="dep-arrow-preview" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#14b8a6"/></marker>
                  </defs>
                  {rows.flatMap((r,i)=>{
                    const list = depList(r);
                    if(!list.length) return [];
                    const live=livePreview(r);
                    const childStartX = xForDay(live?live.start:r.start);
                    const childEndX = xForDay(live?live.end:r.end) + dayW;
                    return list.flatMap(dep=>{
                      const depId = dep.id;
                      const pi=rows.findIndex(rr=>rr.id===depId); if(pi<0)return [];
                      const par=rows[pi]; const liveP=livePreview(par);
                      const parStartX = xForDay(liveP?liveP.start:par.start);
                      const parEndX = xForDay(liveP?liveP.end:par.end) + dayW;
                      const type = dep.type || 'FS';
                      // Anchor points per dep type. Arrow margin: -4 from child side to leave room for the arrowhead.
                      let parentX, childX;
                      if (type === 'SS')      { parentX = parStartX; childX = childStartX - 4; }
                      else if (type === 'FF') { parentX = parEndX;   childX = childEndX + 4; }
                      else if (type === 'SF') { parentX = parStartX; childX = childEndX + 4; }
                      else                    { parentX = parEndX;   childX = childStartX - 4; }
                      const isCrit=critical.edges.has(depId+'→'+r.id);
                      const focusDim=focusChain&&(!focusChain.has(r.id)||!focusChain.has(depId));
                      const inHover=hoverChain&&hoverChain.has(r.id)&&hoverChain.has(depId);
                      const hoverDim=hoverChain&&!inHover;
                      const isEditingThis = drag?.kind==='dep-edit' && drag.fromId===depId && drag.toId===r.id;
                      const isHoveredEdge = hoveredDepEdge?.fromId===depId && hoveredDepEdge?.toId===r.id;
                      const approachFromLeft = type==='FS' || type==='SS';
                      const path=buildArrowPath(pi,i,parentX,childX,rows,axis.start,dayW,rowH,approachFromLeft);
                      const pY=pi*rowH+rowH/2, cY=i*rowH+rowH/2;
                      const handleStyle = (isHoveredEdge || isEditingThis) ? {opacity:1} : {opacity:0,pointerEvents:'none'};
                      return [
                        <path key={r.id+'-'+depId+'-'+type}
                          className={`dep-path${isCrit?' critical':''}${(focusDim||hoverDim)?' dimmed':''}${(inHover&&!isCrit)?' hover-lit':''}${showAllDeps&&!focusDim&&!hoverDim?' show-all':''}${isEditingThis?' editing':''}`}
                          d={path}
                          onMouseEnter={()=>setHoveredDepEdge({fromId:depId,toId:r.id})}
                          onMouseLeave={()=>setHoveredDepEdge(p=>p&&p.fromId===depId&&p.toId===r.id?null:p)}
                          onContextMenu={e=>{ e.preventDefault(); e.stopPropagation(); setDepCtxMenu({x:e.clientX,y:e.clientY,fromId:depId,toId:r.id}); }}/>,
                        <circle key={r.id+'-'+depId+'-from'} className="dep-handle"
                          cx={parentX} cy={pY} r={5} style={handleStyle}
                          onMouseEnter={()=>setHoveredDepEdge({fromId:depId,toId:r.id})}
                          onMouseLeave={()=>setHoveredDepEdge(p=>p&&p.fromId===depId&&p.toId===r.id?null:p)}
                          onPointerDown={e=>beginDepEdit(e,depId,r.id,'from')}/>,
                        <circle key={r.id+'-'+depId+'-to'} className="dep-handle"
                          cx={childX} cy={cY} r={5} style={handleStyle}
                          onMouseEnter={()=>setHoveredDepEdge({fromId:depId,toId:r.id})}
                          onMouseLeave={()=>setHoveredDepEdge(p=>p&&p.fromId===depId&&p.toId===r.id?null:p)}
                          onPointerDown={e=>beginDepEdit(e,depId,r.id,'to')}/>
                      ];
                    });
                  })}
                  {drag?.kind==='dep'&&(()=>{
                    const fromRow=rows.findIndex(r=>r.id===drag.id); if(fromRow<0)return null;
                    const ft=rows[fromRow];
                    const x1=xForDay(ft.end)+dayW, y1=fromRow*rowH+rowH/2;
                    const gr=gridScrollRef.current?.getBoundingClientRect()||{left:0,top:0};
                    const x2=drag.currentClientX-gr.left+gridScrollRef.current.scrollLeft;
                    const y2=drag.currentClientY-gr.top+gridScrollRef.current.scrollTop;
                    return <path className="dep-path preview" d={`M${x1} ${y1} L${Math.max(x1+8,x2-12)} ${y1} L${Math.max(x1+8,x2-12)} ${y2} L${x2} ${y2}`}/>;
                  })()}
                  {drag?.kind==='dep-edit'&&(()=>{
                    const {fromId, toId, endpoint} = drag;
                    const anchorId = endpoint==='to' ? fromId : toId;
                    const ri = rows.findIndex(rr=>rr.id===anchorId); if(ri<0) return null;
                    const rA = rows[ri];
                    const lA = livePreview(rA);
                    const aStart = xForDay(lA?lA.start:rA.start);
                    const aEnd   = xForDay(lA?lA.end:rA.end) + dayW;
                    // Anchor x: when dragging the 'to' end, anchor is the predecessor (from). When dragging 'from', anchor is the successor (to).
                    const x1 = endpoint==='to' ? aEnd : aStart;
                    const y1 = ri*rowH + rowH/2;
                    const gr = gridScrollRef.current?.getBoundingClientRect()||{left:0,top:0};
                    const x2 = drag.currentClientX - gr.left + gridScrollRef.current.scrollLeft;
                    const y2 = drag.currentClientY - gr.top + gridScrollRef.current.scrollTop;
                    const dirX = x2>=x1 ? Math.max(x1+8,x2-12) : Math.min(x1-8,x2+12);
                    return <path className="dep-path preview" d={`M${x1} ${y1} L${dirX} ${y1} L${dirX} ${y2} L${x2} ${y2}`}/>;
                  })()}
                </svg>
              )}

              {/* Bar layer */}
              <div className="bar-layer">
                {drag?.kind==='alt-move'&&drag.deltaDays!==0&&(()=>{
                  const t=tasks.find(x=>x.id===drag.id); if(!t)return null;
                  const ri=rows.findIndex(r=>r.id===drag.id); if(ri<0)return null;
                  const x=xForDay(addDays(drag.origStart,drag.deltaDays));
                  const w=(diffDays(drag.origStart,drag.origEnd)+1)*dayW-2;
                  return <div className="alt-ghost" style={{left:x+'px',top:ri*rowH+(rowH-22)/2+'px',width:w+'px',background:t.color||'#96c6e8'}}/>;
                })()}
                {drag?.kind==='create'&&(()=>{
                  let s=drag.startDay,en=drag.endDay; if(s>en){const tmp=s;s=en;en=tmp;}
                  const x=xForDay(s), w=(diffDays(s,en)+1)*dayW;
                  const top=drag.rowIdx*rowH+(rowH-22)/2;
                  return <div className="drag-create-hint" style={{left:x+'px',top:top+'px',width:Math.max(dayW,w)+'px'}}>{w>60?`${diffDays(s,en)+1}d`:''}</div>;
                })()}

                {rows.map((r,i)=>{
                  const live=livePreview(r);
                  const start=live?live.start:r.start, end=live?live.end:r.end;
                  const x=xForDay(start);
                  const w=r.milestone?dayW:(diffDays(start,end)+1)*dayW-2;
                  const top=i*rowH+(rowH-22)/2;
                  const dragging=drag&&drag.id===r.id;
                  const sel=selected===r.id;
                  const multiSel=selectedSet.has(r.id);
                  const isPast=!dragging&&end<todayStr;

                  if(r.isProject||r.isOwnerGroup){
                    const isOwner=r.isOwnerGroup;
                    const projCost = isOwner ? 0 : (costRoll.perTask.get(r.id) || 0);
                    return (
                      <div key={r.id} className={`bar project${isOwner?' owner-rollup':''}`}
                        title={projCost>0 ? `${r.title} · ${formatCost(projCost)} total` : r.title}
                        style={{left:x+'px',top:i*rowH+(rowH-12)/2+'px',width:w+'px',height:'12px'}}>
                        {!isOwner&&<span className="proj-cap"/>}
                        <div className="bar-ttl">{r.title}</div>
                      </div>
                    );
                  }

                  const focusDimmed=focusChain&&!focusChain.has(r.id);
                  const hoverDimmed=!focusChain&&hoverChain&&!hoverChain.has(r.id);
                  const isConflict=conflicts.has(r.id);
                  const isRenaming=renaming?.id===r.id;
                  const health=getHealth(r,atRisk.has(r.id));
                  const liveProgress=(drag?.kind==='prog'&&drag.id===r.id)?(drag.liveProgress??0):(r.progress||0);
                  const bg=r.done?'#1d342f':(r.color||'#96c6e8');

                  if(r.milestone){
                    return (
                      <div key={r.id}
                        className={`bar milestone${dragging?' dragging':''}${sel?' selected':''}${multiSel?' multi-sel':''}${r.done?' done':''}${critical.nodes.has(r.id)?' critical':''}${focusDimmed?' dimmed':''}${hoverDimmed?' hover-dim':''}${r.blocking?' blocking':''}`}
                        data-bar-id={r.id} style={{left:x+'px',top:top+'px',width:dayW+'px'}}
                        onPointerDown={e=>{if(isRenaming)return;beginBarDrag(e,r,'move');}}
                        onMouseEnter={()=>setHoveredBarId(r.id)} onMouseLeave={()=>setHoveredBarId(null)}
                        onClick={e=>{e.stopPropagation();setSelected(r.id);}}
                        onDoubleClick={e=>{e.stopPropagation();setRenaming({id:r.id,value:r.title});}}
                        onContextMenu={e=>{e.preventDefault();if(!selectedSet.has(r.id)){setSelected(r.id);setSelectedSet(new Set([r.id]));}setCtxMenu({x:e.clientX,y:e.clientY,taskId:r.id});}}>
                        <span className="diamond" style={{background:r.color||'#96c6e8'}}/>
                        {isRenaming
                          ?<input className="row-rename bar-rename" style={{position:'absolute',left:'24px',width:'180px',background:'var(--surface-2)',color:'var(--t1)'}}
                              value={renaming.value} onChange={e=>setRenaming({...renaming,value:e.target.value})} onBlur={commitRename}
                              onKeyDown={e=>{if(e.key==='Enter')commitRename();if(e.key==='Escape')setRenaming(null);e.stopPropagation();}}/>
                          :<span className="bar-ttl">{r.title}</span>
                        }
                        <span className="dep-knob" onPointerDown={e=>beginDepDrag(e,r)}/>
                      </div>
                    );
                  }

                  const durLabel = formatDuration(start, end, calendar);
                  const isRecurInstance = !!r.recurrenceParent;
                  const isRecurSource = !!r.recurrence;
                  const isShort = w < 30;
                  const showInsideLabel = labelPos==='inside' || labelPos==='both' || (labelPos==='auto' && (w-20)>=r.title.length*6.2);
                  return (
                    <React.Fragment key={r.id}>
                    <div
                      className={`bar${dragging?' dragging':''}${sel?' selected':''}${multiSel?' multi-sel':''}${r.done?' done':''}${tw.compactBars?' compact':''}${critical.nodes.has(r.id)?' critical':''}${focusDimmed?' dimmed':''}${hoverDimmed?' hover-dim':''}${r.blocking?' blocking':''}${drag?.kind==='prog'&&drag.id===r.id?' prog-dragging':''}${isPast?' past':''}${isConflict&&showConflicts?' conflict-bar':''}${isRecurInstance?' recur-instance':''}${isShort?' short':''}${r.locked?' bar-locked':''}`}
                      data-bar-id={r.id}
                      style={{left:x+'px',top:top+'px',width:w+'px',background:`linear-gradient(180deg,${bg},${shade(bg,-.18)})`,border:`1px solid ${shade(bg,-.35)}`,'--bar-c':bg,'--bar-c-d':shade(bg,-.35),'--bar-c-l':shade(bg,.32)}}
                      onPointerDown={e=>{
                        if(isRenaming)return;
                        const rect=e.currentTarget.getBoundingClientRect();
                        const ox=e.clientX-rect.left, bw=rect.width;
                        const coarse=window.matchMedia&&window.matchMedia('(pointer:coarse)').matches;
                        const edge=Math.min(coarse?18:12, bw*0.25);
                        let kind='move';
                        if(!isRecurInstance && !isShort){
                          if(ox<edge) kind='l';
                          else if(ox>bw-edge) kind='r';
                        }
                        beginBarDrag(e,r,kind);
                      }}
                      onPointerMove={e=>{
                        if(drag||isRenaming||isRecurInstance||isShort) return;
                        const rect=e.currentTarget.getBoundingClientRect();
                        const ox=e.clientX-rect.left, bw=rect.width;
                        const coarse=window.matchMedia&&window.matchMedia('(pointer:coarse)').matches;
                        const edge=Math.min(coarse?18:12, bw*0.25);
                        let zone='';
                        if(ox<edge) zone='l';
                        else if(ox>bw-edge) zone='r';
                        if(e.currentTarget.dataset.zone!==zone){
                          if(zone) e.currentTarget.dataset.zone=zone;
                          else delete e.currentTarget.dataset.zone;
                        }
                      }}
                      onPointerLeave={e=>{ if(e.currentTarget.dataset.zone) delete e.currentTarget.dataset.zone; }}
                      onMouseEnter={()=>setHoveredBarId(r.id)} onMouseLeave={()=>setHoveredBarId(null)}
                      onClick={e=>{e.stopPropagation();setSelected(r.id);}}
                      onDoubleClick={e=>{if(isRecurInstance)return;e.stopPropagation();setRenaming({id:r.id,value:r.title});}}
                      onContextMenu={e=>{e.preventDefault();if(isRecurInstance)return;if(!selectedSet.has(r.id)){setSelected(r.id);setSelectedSet(new Set([r.id]));}setCtxMenu({x:e.clientX,y:e.clientY,taskId:r.id});}}
                      title={isRenaming?'':(isRecurInstance?`${r.title} · recurring instance — edit the source task to change`:`${r.title} · ${fmtShort(start)} → ${fmtShort(end)} · ${durLabel}${r.owner?' · '+r.owner:''}${typeof r.cost==='number'?' · '+formatCost(r.cost):''}${isRecurSource?' · ↻ recurring source':''}${isShort?' · short bar — right-click or use the • dot for resize':''}`)}>
                      {r.locked&&<span className="lock-icon" title="Locked — dates frozen"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><rect x="3" y="7" width="10" height="7" rx="1.5"/><path d="M5 7V5a3 3 0 016 0v2"/></svg></span>}
                      {liveProgress>0&&<div className="bar-prog" style={{width:(liveProgress*100)+'%',background:`${shade(bg,-.45)}66`}}/>}
                      {!r.done&&liveProgress>0&&liveProgress<.99&&!isRecurInstance&&(
                        <div className="bar-prog-handle" style={{left:`calc(${Math.max(6,Math.min(94,liveProgress*100))}% - 1px)`}}
                          onPointerDown={e=>{e.stopPropagation();beginProgDrag(e,r);}}/>
                      )}
                      {(isRecurInstance||isRecurSource)&&<div className="recur-icon" title={isRecurInstance?'Recurring instance — edit the source':'Recurring source'}>↻</div>}
                      {isRenaming
                        ?<input className="bar-rename" value={renaming.value} onChange={e=>setRenaming({...renaming,value:e.target.value})} onBlur={commitRename}
                            onKeyDown={e=>{if(e.key==='Enter')commitRename();if(e.key==='Escape')setRenaming(null);e.stopPropagation();}}/>
                        :<div className="bar-ttl">{showInsideLabel?r.title:''}</div>
                      }
                      {w>90&&!isRenaming&&<div className="bar-meta">{durLabel}</div>}
                      {showOwners&&r.owner&&w>70&&!isRenaming&&<div className="bar-owner">{r.owner.slice(0,2)}</div>}
                      {health&&!isRenaming&&<div className={`health-pip ${health}`} title={`Health: ${health}`}/>}
                      {atRisk.has(r.id)&&!r.done&&<div className="bar-risk-edge"/>}
                      {isConflict&&showConflicts&&<div className="conflict-dot" title="Owner double-booked">!</div>}
                      {isShort && !isRecurInstance && (
                        <div className="bar-short-dot" title="Resize / link options"
                          onPointerDown={e=>{e.stopPropagation();}}
                          onClick={e=>{e.stopPropagation();
                            if(!selectedSet.has(r.id)){setSelected(r.id);setSelectedSet(new Set([r.id]));}
                            setCtxMenu({x:e.clientX,y:e.clientY,taskId:r.id});
                          }}>•••</div>
                      )}
                      {!isRecurInstance && <span className="dep-knob" onPointerDown={e=>beginDepDrag(e,r)} title="Drag to link →"/>}
                    </div>
                    {!isRenaming&&(labelPos==='both'||!showInsideLabel)&&(
                      <div className="bar-ttl-ext" style={{left:(x+w+4)+'px',top:top+'px'}}>{r.title}</div>
                    )}
                    </React.Fragment>
                  );
                })}
              </div>

              {snapInfo&&<div className="snap-badge" style={{left:snapInfo.x+6+'px',top:snapInfo.y+rowH/2-11+'px'}}>{snapInfo.label}</div>}
              {lasso&&<div className="lasso-rect" style={{left:Math.min(lasso.x1,lasso.x2)+'px',top:Math.min(lasso.y1,lasso.y2)+'px',width:Math.abs(lasso.x2-lasso.x1)+'px',height:Math.abs(lasso.y2-lasso.y1)+'px'}}/>}
            </div>
          </div>)}
        </div>
          </div>{/* /.work-row */}
        </div>{/* /.work-area */}
      </div>

      {/* Status bar */}
      <div className="sbar">
        <span className="dot"/>
        <span>
          {activeProject ? `${activeProject.name} · ` : ''}
          {tasks.length} tasks · {tasks.filter(t=>t.deps?.length).length} deps
          {conflicts.size>0?` · ⚠ ${conflicts.size} conflicts`:''}
          {selectedSet.size>1?` · ${selectedSet.size} selected`:''}
          {dirty?' · unsaved':''}
        </span>
        <span className="right">
          <span><kbd>drag empty row</kbd> create</span>
          <span><kbd>⇧+drag</kbd> lasso</span>
          <span><kbd>⌥+drag</kbd> duplicate</span>
          <span><kbd>Ctrl+S</kbd> save</span>
          <span><kbd>0–9</kbd> dur</span>
          <span><kbd>F2</kbd> rename</span>
        </span>
      </div>
    </div>

    {/* Drag tooltip */}
    {drag&&(drag.kind==='move'||drag.kind==='l'||drag.kind==='r'||drag.kind==='group-move'||drag.kind==='alt-move')&&(()=>{
      const t=tasks.find(tt=>tt.id===drag.id); if(!t)return null;
      const live=livePreview(t); if(!live)return null;
      const durLabel = formatDuration(live.start, live.end, calendar);
      const verb=drag.kind==='group-move'?`Group ×${selectedSet.size}`:drag.kind==='alt-move'?'Duplicate':drag.kind==='l'?'Resize start':drag.kind==='r'?'Resize end':'Move';
      return (
        <div className="drag-tooltip" style={{left:drag.currentClientX+14+'px',top:drag.currentClientY+14+'px'}}>
          <div className="dt-meta">{verb} · {drag.deltaDays>0?'+':''}{drag.deltaDays}d{drag.snapped?' 🔒 snapped':''}</div>
          <div className="dt-dates">{fmtShort(live.start)} → {fmtShort(live.end)} ({durLabel})</div>
        </div>
      );
    })()}

    {/* Inspector drawer — slides in from right; persistent wrapper for slide-out animation */}
    <div ref={drawerRef}
         className={"inspector"+((selected && (()=>{
           const r = rows.find(x=>x.id===selected) || expandedTasks.find(x=>x.id===selected);
           if (!r) return false;
           if (r.isProject||r.isOwnerGroup||r.kind==='project'||renaming?.id===r.id) return false;
           if (r.recurrenceParent) return false;
           return true;
         })()) ? " open" : "")}
         onPointerDown={e=>e.stopPropagation()}>
    {selected&&(()=>{
      // Look up the live task. In non-Gantt views, rows[] is the Gantt build,
      // so we cannot rely on findIndex there — locate by id via expandedTasks.
      let r = rows.find(x=>x.id===selected) || expandedTasks.find(x=>x.id===selected);
      if (!r) return null;
      if (r.isProject||r.isOwnerGroup||r.kind==='project'||renaming?.id===r.id) return null;
      if (r.recurrenceParent) return null;
      const taskLive = tasks.find(t=>t.id===r.id) || r;
      const live = viewMode === 'gantt' ? livePreview(r) : null;
      const start=live?live.start:r.start, end=live?live.end:r.end;
      const dur=diffDays(start,end)+1, isCrit=critical.nodes.has(r.id);
      const insDurLabel = formatDuration(start, end, calendar);

      const ownersByName=new Map(owners.map(o=>[o.name,o]));
      const computedCost=computeTaskCost(taskLive, ownersByName);
      const hasExplicitCost=typeof taskLive.cost==='number' && !isNaN(taskLive.cost);
      const links=Array.isArray(taskLive.links)?taskLive.links:[];
      const cf=taskLive.customFields && typeof taskLive.customFields==='object' ? taskLive.customFields : {};
      const cfEntries=Object.entries(cf);

      const setPriority = (p) => updateTasks(ts=>ts.map(t=>t.id===r.id?{...t,priority:p}:t));
      const setColor = (c) => updateTasks(ts=>ts.map(t=>t.id===r.id?{...t,color:c}:t));
      const setStart = (s) => updateTasks(ts=>applySchedule(ts.map(t=>{
        if(t.id!==r.id) return t;
        // keep duration if both, else snap end
        const dur0 = diffDays(t.start, t.end);
        const ne = addDays(s, dur0);
        return {...t, start:s, end: ne < s ? s : ne };
      }), r.id));
      const setEnd = (e) => updateTasks(ts=>applySchedule(ts.map(t=>{
        if(t.id!==r.id) return t;
        return {...t, end: e < t.start ? t.start : e };
      }), r.id));
      const setOwner = (name) => updateTasks(ts=>ts.map(t=>t.id===r.id?{...t,owner:name||undefined}:t));
      const setNotes = (v) => updateTasks(ts=>ts.map(t=>t.id===r.id?{...t,notes:v}:t));
      const setCost = (v) => {
        const n = v === '' ? null : Number(v);
        if (n != null && (isNaN(n) || !isFinite(n))) return;
        updateTasks(ts=>ts.map(t=>t.id===r.id?{...t,cost: n==null?null:n}:t));
      };
      const updateLinks = (next) => updateTasks(ts=>ts.map(t=>t.id===r.id?{...t,links:next}:t));
      const updateCustom = (next) => updateTasks(ts=>ts.map(t=>t.id===r.id?{...t,customFields:next}:t));

      return (
        <>
          <div className="ins-title">
            <span className="ins-title-text">{taskLive.title}</span>
            {isCrit&&<span className="ins-crit">CRITICAL</span>}
            <button
              className={"ins-pin"+(drawerPinned?" active":"")}
              title={drawerPinned?"Unpin — drawer will close on click-away / Esc":"Pin — drawer stays open until ×"}
              aria-label={drawerPinned?"Unpin inspector":"Pin inspector"}
              aria-pressed={drawerPinned}
              onClick={()=>setDrawerPinned(p=>!p)}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <path d="M12 17v5"/>
                <path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/>
              </svg>
            </button>
            <button
              className={"ins-pin"+(r.locked?" active":"")}
              title={r.locked?"Unlock task — dates editable again":"Lock task — freeze dates, scheduler skips"}
              onClick={()=>toggleLock(r.id)}>
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><rect x="3" y="7" width="10" height="7" rx="1.5"/><path d="M5 7V5a3 3 0 016 0v2"/></svg>
            </button>
            <button className="ins-close" title="Close (Esc)" aria-label="Close inspector" onClick={()=>{ setDrawerPinned(false); setSelected(null); }}>×</button>
          </div>
          <div className="ins-row"><span className="lbl">Dates</span><span className="val">{fmtShort(start)} → {fmtShort(end)}</span><span className="dur-pill" style={{marginLeft:'auto'}}>{r.milestone?'◆':insDurLabel}</span></div>
          <div className="ins-row ins-deps-row"><span className="lbl">Deps</span>
            <div style={{display:'flex',flexWrap:'wrap',gap:'3px',alignItems:'center',flex:1}}>
            {!(taskLive.deps?.length)?<span className="ins-dep-empty">none</span>:depList(taskLive).map((dep)=>{
              const dt=tasks.find(t=>t.id===dep.id);
              const updateDep = (patch) => updateTasks(ts=>applySchedule(ts.map(t=>{
                if (t.id !== r.id) return t;
                const list = depList(t);
                const nx = list.map(d => d.id===dep.id ? {...d, ...patch} : d);
                return {...t, deps: nx};

        <div className="ctx-menu" style={{left:cx+'px',top:cy+'px'}} onMouseDown={e=>e.stopPropagation()}>
          <div className="ctx-hdr">{fromT?.title||'?'} → {toT?.title||'?'}</div><div className="ctx-sep"/>
          <div className="ctx-item has-sub" onClick={()=>setCtxSubmenu({x:subX,y:cy,kind:'depType',fromId,toId})}>Change type ({dep?.type||'FS'})<span className="chev">▸</span></div>
          <div className="ctx-item" style={{gap:'6px'}}>
            <span>Lag (days)</span>
            <input type="number" style={{width:'54px',font:'11px var(--mono)',background:'var(--surface-2)',color:'var(--t1)',border:'1px solid var(--accent-border)',borderRadius:'3px',padding:'1px 4px'}}
              defaultValue={dep?.lag||0}
              onClick={e=>e.stopPropagation()}
              onKeyDown={e=>{ if(e.key==='Enter'){ const n=parseInt(e.target.value,10); if(!isNaN(n)) setDepLag(fromId,toId,n); closeAll(); } if(e.key==='Escape') closeAll(); }}
              onBlur={e=>{ const n=parseInt(e.target.value,10); if(!isNaN(n)) setDepLag(fromId,toId,n); }}/>
          </div>
          <div className="ctx-sep"/>
          <div className="ctx-item danger" onClick={()=>{ deleteDependency(fromId,toId); closeAll(); }}>Delete dependency<span className="kbd">⌫</span></div>
        </div>
      );
    })()}

    {/* Bulk picker popover */}
    {bulkPicker&&(()=>{
      const cx=Math.min(bulkPicker.x,window.innerWidth-260), cy=Math.min(bulkPicker.y,window.innerHeight-260);
      const ids=bulkPicker.ids;
      const close=()=>setBulkPicker(null);
      return (
        <div className="bulk-picker" style={{left:cx+'px',top:cy+'px'}} onMouseDown={e=>e.stopPropagation()}>
          <div className="bp-title">Apply to {ids.size} tasks</div>
          {bulkPicker.kind==='owner' && (
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              <select className="ins-select" defaultValue="" onChange={e=>{ const v=e.target.value; bulkSetField(ids,'owner', v||undefined); close(); }}>
                <option value="">— none / clear —</option>
                {owners.map(o=><option key={o.name} value={o.name}>{o.name}</option>)}
              </select>
              <input className="ins-input" placeholder="+ new owner & assign" onKeyDown={e=>{
                if(e.key==='Enter'){
                  const v=e.target.value.trim();
                  if(v){ addOwnerToList(v); bulkSetField(ids,'owner',v); close(); }
                }
              }}/>
            </div>
          )}
          {bulkPicker.kind==='color' && (
            <div className="ins-swatches">
              {COLOR_PRESETS.map(c=>(
                <button key={c} className="ins-swatch" style={{background:c}} title={c}
                  onClick={()=>{ bulkSetField(ids,'color',c); close(); }}/>
              ))}
            </div>
          )}
          {bulkPicker.kind==='priority' && (
            <div className="ins-seg">
              {['p1','p2','p3'].map(p=>(
                <button key={p} className={p} onClick={()=>{ bulkSetField(ids,'priority',p); close(); }}>{p.toUpperCase()}</button>
              ))}
            </div>
          )}
        </div>
      );
    })()}

    {/* Project Context menu */}
    {projCtxMenu&&(()=>{
      const p=projects.find(x=>x.id===projCtxMenu.projectId); if(!p)return null;
      const cx=Math.min(projCtxMenu.x,window.innerWidth-200), cy=Math.min(projCtxMenu.y,window.innerHeight-200);
      return (
        <div className="ctx-menu" style={{left:cx+'px',top:cy+'px',minWidth:'180px'}} onMouseDown={e=>e.stopPropagation()}>
          <div className="ctx-hdr">{p.name}</div><div className="ctx-sep"/>
          <div className="ctx-item" onClick={()=>{setProjRenaming({id:p.id,value:p.name});setProjCtxMenu(null);}}>Rename<span className="kbd">F2</span></div>
          <div className="ctx-item" onClick={()=>{duplicateProject(p.id);setProjCtxMenu(null);}}>Duplicate</div>
          <div className="ctx-sep"/>
          <div className="ctx-item danger" onClick={()=>{deleteProject(p.id);setProjCtxMenu(null);}}>Delete</div>
        </div>
      );
    })()}

    {/* Group row kebab context menu */}
    {groupCtxMenu&&(()=>{
      const isProject=groupCtxMenu.kind==='project';
      const isOpen=!collapsed.has(groupCtxMenu.groupId);
      const cx=Math.min(groupCtxMenu.x,window.innerWidth-220), cy=Math.min(groupCtxMenu.y,window.innerHeight-280);
      // current color: project task's color field, or owner's color from ownerColors
      const curColor = isProject
        ? tasks.find(t=>t.id===groupCtxMenu.groupId)?.color||null
        : (activeProject?.ownerColors||{})[groupCtxMenu.title]||null;
      return (
        <div className="ctx-menu" style={{left:cx+'px',top:cy+'px',minWidth:'200px'}} onMouseDown={e=>e.stopPropagation()}>
          <div className="ctx-hdr">{groupCtxMenu.title}</div>
          <div className="ctx-sep"/>
          <div className="ctx-item" onClick={()=>{setGroupRenaming({id:groupCtxMenu.groupId,kind:groupCtxMenu.kind,value:groupCtxMenu.title});setGroupCtxMenu(null);}}>
            Rename<span className="kbd">F2</span>
          </div>
          <div className="ctx-sep"/>
          <div style={{padding:'2px 8px 2px',fontSize:'9.5px',fontFamily:'var(--mono)',color:'var(--t4)',letterSpacing:'.06em',textTransform:'uppercase'}}>Color</div>
          <div className="ctx-swatch-row">
            {COLOR_PRESETS.map(hex=>(
              <button key={hex} className={`ctx-swatch${curColor===hex?' active':''}`}
                style={{background:hex}}
                title={hex}
                onClick={()=>setGroupColor(groupCtxMenu.kind,groupCtxMenu.groupId,groupCtxMenu.title,hex)}/>
            ))}
            <button className={`ctx-swatch clr${!curColor?' active':''}`}
              title="Clear color"
              onClick={()=>setGroupColor(groupCtxMenu.kind,groupCtxMenu.groupId,groupCtxMenu.title,null)}/>
          </div>
          <div className="ctx-sep"/>
          <div className="ctx-item" onClick={()=>{setCollapsed(c=>{const n=new Set(c);isOpen?n.add(groupCtxMenu.groupId):n.delete(groupCtxMenu.groupId);return n;});setGroupCtxMenu(null);}}>
            {isOpen?'Collapse':'Expand'}
          </div>
          {isProject&&<>
            <div className="ctx-sep"/>
            <div className="ctx-item danger" onClick={()=>{const {groupId,title}=groupCtxMenu;setGroupCtxMenu(null);deleteGroupTasks(groupId,title);}}>Delete set…</div>
          </>}
          {!isProject&&<>
            <div className="ctx-sep"/>
            <div className="ctx-item danger" onClick={()=>{clearOwnerGroup(groupCtxMenu.title);setGroupCtxMenu(null);}}>Remove owner from tasks</div>
          </>}
        </div>
      );
    })()}

    {/* Predecessor picker popover */}
    {predPicker&&(()=>{
      const {taskId, anchor} = predPicker;
      const currentTask = tasks.find(t=>t.id===taskId); if(!currentTask) return null;
      const existingPredIds = new Set(depList(currentTask).map(d=>d.id));
      const candidates = tasks
        .filter(t=>t.id!==taskId && t.kind!=='project' && !existingPredIds.has(t.id))
        .filter(t=>!predFilter || t.title.toLowerCase().includes(predFilter.toLowerCase()))
        .sort((a,b)=>a.start.localeCompare(b.start))
        .slice(0,40);
      const addPred = (predId) => {
        if(wouldCreateCycle(tasks, predId, taskId)){
          showToast(`Circular dependency — would create a cycle.`, 'err');
        } else {
          updateTasks(ts=>applySchedule(ts.map(t=>{
            if(t.id!==taskId) return t;
            const existing=depList(t);
            if(existing.some(d=>d.id===predId)) return t;
            return {...t, deps:[...existing,{id:predId,type:'FS',lag:0}]};
          }), taskId));
        }
        setPredPicker(null);
      };
      return (
        <div className="pred-picker" style={{left:Math.min(anchor.x,window.innerWidth-240)+'px',top:Math.min(anchor.y,window.innerHeight-280)+'px'}}
          onMouseDown={e=>e.stopPropagation()}>
          <input autoFocus className="pred-picker-input" placeholder="Search tasks…"
            value={predFilter} onChange={e=>setPredFilter(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Escape'){ e.stopPropagation(); setPredPicker(null); }}}/>
          <div className="pred-picker-list">
            {candidates.length===0&&<div style={{padding:'6px 8px',fontSize:'11px',color:'var(--t4)'}}>No matches</div>}
            {candidates.map(t=>(
              <div key={t.id} className="pred-picker-item" onClick={()=>addPred(t.id)}>{t.title}</div>
            ))}
          </div>
        </div>
      );
    })()}

    {/* App toast notifications */}
    {toasts.length>0&&(
      <div className="app-toast-wrap">
        {toasts.map(t=><div key={t.id} className={`app-toast${t.kind==='err'?' err':t.kind==='warn'?' warn':''}`}>{t.msg}</div>)}
      </div>
    )}

    {/* Duration toast */}
    {durationBuf&&selected&&(()=>{
      const i=rows.findIndex(r=>r.id===selected); if(i<0)return null;
      const r=rows[i]; if(r.isProject||r.milestone)return null;
      const grid=gridScrollRef.current; if(!grid)return null;
      const gRect=grid.getBoundingClientRect();
      const x=gRect.left+xForDay(r.start)-grid.scrollLeft;
      const y=gRect.top+i*rowH+rowH/2-grid.scrollTop-14;
      const w=(diffDays(r.start,r.end)+1)*dayW;
      return <div className="dur-toast" style={{left:Math.min(x+w+12,window.innerWidth-120)+'px',top:Math.max(y,gRect.top+6)+'px'}}>{durationBuf}d<span className="hint"> ↵ apply</span></div>;
    })()}

    {/* Focus chain banner */}
    {focusChain&&(
      <div className="focus-banner">
        <span>Dep subtree · <strong>{focusChain.size}</strong> tasks</span>
        <kbd>Ctrl E</kbd> toggle <kbd>Esc</kbd> exit
        <button className="clear" onClick={()=>setFocusChain(null)}>clear</button>
      </div>
    )}

    {/* Recurrence editor popover */}
    {recurEditor&&(()=>{
      const t = tasks.find(x => x.id === recurEditor.taskId);
      if (!t) { return null; }
      const draft = recurEditor.draft;
      const close = () => setRecurEditor(null);
      const apply = () => {
        const pattern = draft.pattern || 'weekly';
        const interval = Math.max(1, parseInt(draft.interval, 10) || 1);
        const count = Math.max(1, parseInt(draft.count, 10) || 1);
        setRecurrence(t.id, { pattern, interval, count });
        close();
      };
      const cx = Math.min(window.innerWidth/2 - 120, window.innerWidth - 280);
      const cy = Math.min(window.innerHeight/2 - 100, window.innerHeight - 240);
      return (
        <div className="tmpl-overlay" onMouseDown={close}>
          <div className="recur-popover" style={{position:'relative',left:0,top:0}} onMouseDown={e=>e.stopPropagation()}>
            <div className="rp-title">{t.recurrence?'Edit recurrence':'Make recurring'} — "{t.title}"</div>
            <div className="rp-row"><label>Pattern</label>
              <select value={draft.pattern} onChange={e=>setRecurEditor({...recurEditor,draft:{...draft,pattern:e.target.value}})}>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
              </select>
            </div>
            <div className="rp-row"><label>Every</label>
              <input type="number" min="1" value={draft.interval}
                onChange={e=>setRecurEditor({...recurEditor,draft:{...draft,interval:e.target.value}})}/>
            </div>
            <div className="rp-row"><label>Count</label>
              <input type="number" min="1" value={draft.count}
                onChange={e=>setRecurEditor({...recurEditor,draft:{...draft,count:e.target.value}})}/>
            </div>
            <div style={{fontSize:10,color:'var(--t4)',marginTop:4}}>
              Generates {Math.max(0,(parseInt(draft.count,10)||1)-1)} additional instances after the source.
            </div>
            <div className="rp-acts">
              {t.recurrence && <button className="rp-btn" onClick={()=>{ setRecurrence(t.id, null); close(); }}>Clear</button>}
              <button className="rp-btn" onClick={close}>Cancel</button>
              <button className="rp-btn primary" onClick={apply}>Save</button>
            </div>
          </div>
        </div>
      );
    })()}

    {/* Template modal (also reachable from welcome screen) */}
    {renderTemplateModal()}

    {/* Batch 5: Hidden file input for browsers without File System Access API. */}
    {!FSA_AVAILABLE && (
      <input
        ref={fileInputRef}
        type="file"
        accept=".json,application/json"
        style={{display:'none'}}
        onChange={onFileInputChange}
      />
    )}

    {/* Batch 5: Keyboard help overlay */}
    {helpOpen && <HelpModal onClose={()=>setHelpOpen(false)} fsaAvailable={FSA_AVAILABLE}/>}

    {/* Phase B1: Command palette (Cmd/Ctrl+K) — fuzzy-search every action. */}
    {paletteOpen && (
      <CommandPalette onClose={()=>setPaletteOpen(false)} commands={[
        // File
        { id:'file.new',  group:'File', label:'New project…',    shortcut:'',          keywords:['create','start'], run:()=>createNewProject() },
        { id:'file.open', group:'File', label:'Open workspace…', shortcut:'',          keywords:['load','import'], run:()=>openWorkspace() },
        { id:'file.save', group:'File', label:FSA_AVAILABLE?'Save':'Download', shortcut:'Ctrl+S',  keywords:['write','export'], run:()=>saveWorkspaceRef.current?.(false) },
        ...(FSA_AVAILABLE ? [{ id:'file.saveas', group:'File', label:'Save as…', shortcut:'Ctrl+Shift+S', run:()=>saveWorkspaceRef.current?.(true) }] : []),
        // Edit
        { id:'edit.undo', group:'Edit', label:'Undo', shortcut:'Ctrl+Z',      run:()=>undoRef.current?.() },
        { id:'edit.redo', group:'Edit', label:'Redo', shortcut:'Ctrl+Shift+Z', run:()=>redoRef.current?.() },
        // View
        { id:'view.gantt',    group:'View', label:'Switch to Gantt view',    keywords:['timeline','bars'],    run:()=>setViewMode('gantt') },
        { id:'view.list',     group:'View', label:'Switch to List view',     keywords:['table','rows'],       run:()=>setViewMode('list') },
        { id:'view.calendar', group:'View', label:'Switch to Calendar view', keywords:['month','dates'],      run:()=>setViewMode('calendar') },
        // Saved views (Phase B2) — dynamic per project.
        { id:'view.save',     group:'View', label:'Save current view as…',   keywords:['bookmark','snapshot'], run:()=>saveCurrentView() },
        ...((activeProject?.savedViews) || []).map(v => ({
          id:'view.apply.'+v.id, group:'View', label:`Switch to view "${v.name}"`,
          keywords:['saved',v.viewMode,v.groupBy], run:()=>applyView(v)
        })),
        // Help
        { id:'help.shortcuts', group:'Help', label:'Show keyboard shortcuts', shortcut:'?', run:()=>setHelpOpen(true) },
      ]}/>
    )}

    {/* Batch 5: Load error modal */}
    {loadError && (
      <div className="err-overlay" onMouseDown={()=>setLoadError(null)}>
        <div className="err-modal" onMouseDown={e=>e.stopPropagation()}>
          <div className="e-hdr">
            <div className="e-icon">!</div>
            <div className="e-title">{loadError.title}</div>
          </div>
          <div className="e-body">{loadError.message}</div>
          <div className="e-foot">
            <button className="e-btn" autoFocus onClick={()=>setLoadError(null)}>OK</button>
          </div>
        </div>
      </div>
    )}

    {/* Custom modal — replaces window.prompt / confirm / alert */}
    {modal && (
      <div className="cmod-overlay" onMouseDown={()=>closeModal(modal.type==='confirm'?false:null)}>
        <div className="cmod" onMouseDown={e=>e.stopPropagation()}>
          <div className="cmod-head">
            <div className={`cmod-icon cmod-icon--${modal.type}${modal.destructive?' cmod-icon--danger':''}`}>
              {modal.type==='confirm'&&!modal.destructive&&<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>}
              {modal.type==='confirm'&&modal.destructive&&<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6m4-6v6"/><path d="M9 6V4h6v2"/></svg>}
              {modal.type==='alert'&&<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>}
              {modal.type==='prompt'&&<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>}
            </div>
            <div className="cmod-title">{modal.title}</div>
          </div>
          {(modal.body||modal.type==='prompt')&&(
            <div className="cmod-body">
              {modal.body}
              {modal.type==='prompt'&&(
                <input
                  ref={modalInputRef}
                  className="cmod-input"
                  defaultValue={modal.defaultValue}
                  autoFocus
                  onKeyDown={e=>{
                    if(e.key==='Enter') closeModal(modalInputRef.current?.value??null);
                    if(e.key==='Escape') closeModal(null);
                  }}
                />
              )}
            </div>
          )}
          <div className="cmod-foot">
            {modal.type!=='alert'&&(
              <button className="cmod-btn" onClick={()=>closeModal(modal.type==='confirm'?false:null)}>{modal.cancelLabel||'Cancel'}</button>
            )}
            <button
              className={`cmod-btn primary${modal.destructive?' danger':''}`}
              autoFocus={modal.type!=='prompt'}
              onClick={()=>closeModal(
                modal.type==='prompt' ? (modalInputRef.current?.value??null) :
                modal.type==='confirm' ? true : undefined
              )}
            >{modal.okLabel||'OK'}</button>
          </div>
        </div>
      </div>
    )}

    <GanttTweaks tw={tw} setTweak={setTweak} activeProject={activeProject} updateActiveProject={updateActiveProject} customConfirm={customConfirm}/>
    </Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
